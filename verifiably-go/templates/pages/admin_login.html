{{define "content_admin_login"}}
<section class="view active">
  <div class="section-label">
    <span class="num">99</span>
    <span class="caps">{{t "Admin · Sign in" $.Lang}}</span>
  </div>
  <h1 class="page-title">{{t "Admin" $.Lang}}<br><em>{{t "sign-in" $.Lang}}</em>.</h1>
  <p class="subtitle" style="margin-bottom:1.25rem">
    {{t "Sign in to manage OIDC providers." $.Lang}}
  </p>

  <div class="auth-wrap">
    <div class="auth-card" style="max-width:380px">
      {{with .Body}}{{with .Error}}
        <div style="background:rgba(220,53,69,0.08);border:1px solid rgba(220,53,69,0.4);color:#dc3545;padding:0.6rem 0.8rem;border-radius:2px;margin-bottom:1rem;font-size:0.85rem">
          {{.}}
        </div>
      {{end}}{{end}}
      <form method="post" action="/admin/login"
            style="display:flex;flex-direction:column;gap:0.75rem">
        <label style="display:flex;flex-direction:column;gap:0.25rem">
          <span class="caps" style="font-size:0.65rem">{{t "Username" $.Lang}}</span>
          <input type="text" name="username" autocomplete="username" required autofocus
                 style="padding:0.5rem;border:1px solid var(--line);background:var(--bg);color:var(--ink);font-family:var(--mono)">
        </label>
        <label style="display:flex;flex-direction:column;gap:0.25rem">
          <span class="caps" style="font-size:0.65rem">{{t "Password" $.Lang}}</span>
          <input type="password" name="password" autocomplete="current-password" required
                 style="padding:0.5rem;border:1px solid var(--line);background:var(--bg);color:var(--ink);font-family:var(--mono)">
        </label>
        <button class="btn" type="submit" style="margin-top:0.4rem">{{t "Sign in as admin" $.Lang}}</button>
      </form>
    </div>
  </div>
</section>
{{end}}
