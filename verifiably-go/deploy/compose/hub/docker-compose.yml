# Hub compose stack — verifiably-go (hub mode) + PostgreSQL + Prometheus + Grafana
#
# Prerequisites:
#   1. Copy .env.example to .env and fill in the required variables.
#   2. Place your ECDSA P-256 PEM key at config/trust-signing-key.pem
#      (or set VERIFIABLY_TRUST_SIGNING_KEY in .env).
#   3. Configure config/federation.json with registered members.
#   4. Generate federation Prometheus targets:
#        ./deploy/compose/monitoring/generate-federation-prometheus.sh \
#            config/federation.json \
#            deploy/compose/hub/federation-targets.json
#
# Start:
#   docker compose -f deploy/compose/hub/docker-compose.yml up -d
#
# Grafana:    http://localhost:3100  (admin / admin)
# Prometheus: http://localhost:9090
# Hub:        http://localhost:8080
#
name: verifiably-hub

services:

  postgres:
    image: postgres:16-alpine
    container_name: hub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-verifiably}
      POSTGRES_USER: ${POSTGRES_USER:-verifiably}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-verifiably}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hub

  verifiably-go:
    image: ${VERIFIABLY_IMAGE:-verifiably/verifiably-go:latest}
    container_name: verifiably-go
    restart: unless-stopped
    environment:
      VERIFIABLY_ROLES: hub
      VERIFIABLY_ADAPTER: registry
      VERIFIABLY_DATABASE_URL: postgres://${POSTGRES_USER:-verifiably}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-verifiably}?sslmode=disable
      VERIFIABLY_PUBLIC_URL: ${VERIFIABLY_PUBLIC_URL:?VERIFIABLY_PUBLIC_URL is required}
      VERIFIABLY_SESSION_SECRET: ${VERIFIABLY_SESSION_SECRET:?VERIFIABLY_SESSION_SECRET is required}
      VERIFIABLY_TRUST_SIGNING_KEY: ${VERIFIABLY_TRUST_SIGNING_KEY:-}
      VERIFIABLY_FEDERATION_CONFIG: /app/config/federation.json
      VERIFIABLY_API_KEYS: ${VERIFIABLY_API_KEYS:-}
      VERIFIABLY_ADMIN_PASSWORD: ${VERIFIABLY_ADMIN_PASSWORD:-}
      VERIFIABLY_GRAFANA_URL: ${GRAFANA_EXTERNAL_URL:-http://localhost:3100}
      VERIFIABLY_PROMETHEUS_URL: http://prometheus:9090
      VERIFIABLY_LOG_JSON: "1"
    volumes:
      - ../../../config:/app/config:ro
      - hub-state:/app/state
    ports:
      - "${HUB_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - hub

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: hub-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=90d
      - --web.enable-lifecycle
      - --web.console.libraries=/usr/share/prometheus/console_libraries
      - --web.console.templates=/usr/share/prometheus/consoles
    volumes:
      # Hub-specific prometheus config (includes file_sd federation job)
      - ../monitoring/prometheus-hub.yml:/etc/prometheus/prometheus.yml:ro
      # Generated federation targets (update with generate-federation-prometheus.sh)
      - ./federation-targets.json:/etc/prometheus/federation-targets.json:ro
      - prometheus-data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    networks:
      - hub
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3

  grafana:
    image: grafana/grafana:10.4.3
    container_name: hub-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      # Open the ecosystem overview dashboard by default
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/verifiably-ecosystem-v1.json
    volumes:
      - ../monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT:-3100}:3000"
    depends_on:
      prometheus:
        condition: service_healthy
    networks:
      - hub
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3

volumes:
  postgres-data:
    name: hub-postgres-data
  hub-state:
    name: hub-state
  prometheus-data:
    name: hub-prometheus-data
  grafana-data:
    name: hub-grafana-data

networks:
  hub:
    name: verifiably-hub
