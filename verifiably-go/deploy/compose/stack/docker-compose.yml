# Pin the project name to `waltid` so that volumes and the default
# network keep their existing `waltid_*` prefixes after renaming the
# parent directory from `docker/waltid` to `docker/stack`. Without
# this, `docker compose up` would create a new `stack_*` network and
# orphan every volume (Postgres data, esignet keystore, Mimoto state),
# losing the seeded wallet-demo-client row and the mock identity. The
# directory name is cosmetic; the project name is load-bearing.
name: waltid

services:
  postgres:
    image: postgres:16.4-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pg_isready", "-q", "-U", "${POSTGRES_USER:-waltid}"]
      interval: 5s
      timeout: 1s
      retries: 5
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-waltid}
      POSTGRES_USER: ${POSTGRES_USER:-waltid}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-waltid}
    volumes:
      - wallet-db:/var/lib/postgresql
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

  # verifiably-redis is the session store for multi-replica verifiably-go
  # deployments. Enabled when VERIFIABLY_REDIS_URL points at it.
  # Pair with Caddy lb_policy=cookie for full sticky-session L7 routing.
  verifiably-redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 1s
      retries: 5
    volumes:
      - verifiably-redis-data:/data
    ports:
      - "${VERIFIABLY_REDIS_PORT:-6380}:6379"
    command: >
      redis-server
      --save 60 1
      --loglevel warning

  # verifiably-pg is the dedicated PostgreSQL instance for verifiably-go's own
  # persistence (sessions, issuance log, status lists). Separate from the
  # waltid `postgres` instance so the two never share credentials or schema.
  # Activated automatically when VERIFIABLY_DATABASE_URL points at it.
  verifiably-pg:
    image: postgres:16.4-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pg_isready", "-q", "-U", "${VERIFIABLY_PG_USER:-verifiably}"]
      interval: 5s
      timeout: 1s
      retries: 5
    environment:
      POSTGRES_DB: ${VERIFIABLY_PG_DB:-verifiably}
      POSTGRES_USER: ${VERIFIABLY_PG_USER:-verifiably}
      POSTGRES_PASSWORD: ${VERIFIABLY_PG_PASSWORD:-verifiably}
    volumes:
      - verifiably-pg-data:/var/lib/postgresql/data
    ports:
      - "${VERIFIABLY_PG_PORT:-5439}:5432"

  caddy:
    image: caddy:2.8
    restart: unless-stopped
    environment:
      WALLET_BACKEND_PORT: ${WALTID_WALLET_PORT:-7001}
      ISSUER_API_PORT: ${WALTID_ISSUER_PORT:-7002}
      VERIFIER_API_PORT: ${WALTID_VERIFIER_PORT:-7003}
      CREDEBL_AGENT_API_PORT: ${CREDEBL_AGENT_API_PORT:-8001}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      # In subdomain mode caddy-public owns :80/:443; deploy.sh sets
      # CADDY_HTTP_PORT=127.0.0.1:8079 so this binding doesn't conflict.
      - "${CADDY_HTTP_PORT:-80}:80"
      - "${WALTID_WALLET_PORT:-7001}:${WALTID_WALLET_PORT:-7001}"
      - "${WALTID_ISSUER_PORT:-7002}:${WALTID_ISSUER_PORT:-7002}"
      - "${WALTID_VERIFIER_PORT:-7003}:${WALTID_VERIFIER_PORT:-7003}"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile

  # caddy-public terminates TLS for the per-subdomain VERIFIABLY_HOSTS_PATTERN
  # mode. Activated by `--profile subdomain`. deploy.sh auto-passes that
  # profile when VERIFIABLY_HOSTS_PATTERN is non-empty so a localhost
  # deploy never bothers binding 80/443. Two prerequisites the operator
  # arranges externally: (1) per-service A records pointing at this host,
  # (2) ports 80 + 443 open. See docs/deploy.md § Per-subdomain deployment.
  caddy-public:
    image: caddy:2
    restart: unless-stopped
    profiles: ["subdomain"]
    environment:
      VERIFIABLY_PUBLIC_DOMAIN: ${VERIFIABLY_PUBLIC_DOMAIN:-}
      VERIFIABLY_LE_EMAIL: ${VERIFIABLY_LE_EMAIL:-}
      CREDEBL_AGENT_API_PORT: ${CREDEBL_AGENT_API_PORT:-8001}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Hairpin NAT fix for COMPOSE-managed containers. An internal container that
    # must reach a PUBLIC subdomain (e.g. wallet-api resolving an OID4VCI offer
    # whose credential_offer_uri / credential_issuer is the public pre-auth host)
    # otherwise routes to the box's own public IP:443 and times out
    # (ConnectTimeoutException) — the box can't hairpin to itself. Aliasing the
    # public FQDN onto caddy-public makes Docker's embedded DNS resolve it to
    # caddy's internal IP, where TLS is terminated and the request is routed to
    # the backend — exactly like an external client, but staying on the docker
    # network. Mirrors the verifiably-go --add-host hairpin fix (start-container.sh)
    # for services compose brings up. Add more public FQDNs here if other internal
    # containers start calling them by their public name.
    networks:
      default:
        aliases:
          - "inji-certify-preauth.${VERIFIABLY_PUBLIC_DOMAIN}"
          # Auth-code Inji Certify's PUBLIC did:web host. inji-verify-service (and
          # any server-side did:web resolver on this network) fetches the issuer
          # DID document at https://inji-certify-authcode.<domain>/.well-known/did.json
          # while verifying a wallet-claimed VC; without this alias it routes to the
          # box public IP and times out (Connection timeout in DidWebPublicKeyResolver),
          # so every auth-code VC verifies as INVALID.
          - "inji-certify-authcode.${VERIFIABLY_PUBLIC_DOMAIN}"
          - "esignet.${VERIFIABLY_PUBLIC_DOMAIN}"
          # walt.id: the wallet-api resolves an OID4VCI credential_offer_uri at
          # walt-issuer (claim) and an OID4VP request_uri at walt-verifier
          # (present) by their PUBLIC names; without these aliases it hits the
          # box public IP and ConnectTimeouts (hairpin NAT).
          - "walt-issuer.${VERIFIABLY_PUBLIC_DOMAIN}"
          - "walt-verifier.${VERIFIABLY_PUBLIC_DOMAIN}"
          - "walt-wallet.${VERIFIABLY_PUBLIC_DOMAIN}"
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile.public:/etc/caddy/Caddyfile
      - caddy-public-data:/data
      - caddy-public-config:/config

  issuer-api:
    image: waltid/issuer-api:0.18.2
    restart: unless-stopped
    depends_on:
      - caddy
    environment:
      SERVICE_HOST: ${VERIFIABLY_PUBLIC_HOST:-localhost}
      ISSUER_API_PORT: ${WALTID_ISSUER_PORT:-7002}
    volumes:
      # Walt.id config files live under deploy/k8s/config/issuer/ so the
      # same files back both the compose stack and the Helm chart's ConfigMap
      # (Phase 1.2). HOCON env-var substitutions resolve at walt.id startup.
      - ../../k8s/config/issuer:/waltid-issuer-api/config:ro

  verifier-api:
    image: waltid/verifier-api:0.18.2
    restart: unless-stopped
    depends_on:
      - caddy
    environment:
      SERVICE_HOST: ${VERIFIABLY_PUBLIC_HOST:-localhost}
      VERIFIER_API_PORT: ${WALTID_VERIFIER_PORT:-7003}
    volumes:
      - ../../k8s/config/verifier:/waltid-verifier-api/config:ro

  wallet-api:
    image: waltid/wallet-api:0.18.2
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      caddy:
        condition: service_started
    environment:
      SERVICE_HOST: ${VERIFIABLY_PUBLIC_HOST:-localhost}
      WALLET_BACKEND_PORT: ${WALTID_WALLET_PORT:-7001}
      DB_NAME: ${POSTGRES_DB:-waltid}
      DB_USERNAME: ${POSTGRES_USER:-waltid}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-waltid}
      POSTGRES_DB_HOST: postgres
      POSTGRES_DB_PORT: 5432
      # Phase 1.2: walt.id wallet crypto material is now env-driven so the
      # same .conf files work for compose and Helm. Defaults below preserve
      # the upstream demo behavior; rotate before any non-demo deploy.
      WALLET_ENCRYPTION_KEY: ${WALLET_ENCRYPTION_KEY:-dncygwnvivxzlohc}
      WALLET_SIGN_KEY: ${WALLET_SIGN_KEY:-jyjeylmidlylokzh}
      WALLET_TOKEN_LIFETIME_DAYS: ${WALLET_TOKEN_LIFETIME_DAYS:-30}
      # OIDC login is OFF by default (logins.conf no longer enables it).
      # These vars are supplied so oidc.conf can still parse — switching on
      # oidc requires real values plus re-adding "oidc" to enabledLoginMethods.
      WALLET_OIDC_PUBLIC_BASE_URL: ${WALLET_OIDC_PUBLIC_BASE_URL:-http://localhost:7101}
      WALLET_OIDC_PROVIDER_NAME: ${WALLET_OIDC_PROVIDER_NAME:-keycloak}
      WALLET_OIDC_REALM_URL: ${WALLET_OIDC_REALM_URL:-http://keycloak:8180/realms/vcplatform}
      WALLET_OIDC_CLIENT_ID: ${WALLET_OIDC_CLIENT_ID:-waltid_backend}
      WALLET_OIDC_CLIENT_SECRET: ${WALLET_OIDC_CLIENT_SECRET:-disabled}
      # Trust registry placeholders — feature dormant until populated.
      WALLET_TRUST_ISSUERS_BASE_URL: ${WALLET_TRUST_ISSUERS_BASE_URL:-}
      WALLET_TRUST_ISSUERS_TRUST_PATH: ${WALLET_TRUST_ISSUERS_TRUST_PATH:-}
      WALLET_TRUST_ISSUERS_GOVERNANCE_PATH: ${WALLET_TRUST_ISSUERS_GOVERNANCE_PATH:-}
      WALLET_TRUST_VERIFIERS_BASE_URL: ${WALLET_TRUST_VERIFIERS_BASE_URL:-}
      WALLET_TRUST_VERIFIERS_TRUST_PATH: ${WALLET_TRUST_VERIFIERS_TRUST_PATH:-}
      WALLET_TRUST_VERIFIERS_GOVERNANCE_PATH: ${WALLET_TRUST_VERIFIERS_GOVERNANCE_PATH:-}
    extra_hosts:
      - "localhost:host-gateway"
      - "host.docker.internal:host-gateway"
    volumes:
      - ../../k8s/config/wallet:/waltid-wallet-api/config:ro
      - wallet-api-data:/waltid-wallet-api/data

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    restart: unless-stopped
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN_USER:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HTTP_PORT: ${KEYCLOAK_PORT:-8180}
      # Force a stable issuer URL regardless of how Keycloak is accessed
      # (browser via public IP vs. containers via internal DNS). Without this,
      # start-dev derives `iss` from the request URL, causing a mismatch when
      # CREDEBL validates tokens via keycloak:8180 that were issued via the
      # public IP.
      KC_HOSTNAME_URL: ${KC_HOSTNAME_URL:-http://${VERIFIABLY_PUBLIC_HOST:-localhost}:${KEYCLOAK_PORT:-8180}}
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_BACKCHANNEL: "true"
      # Trust X-Forwarded-Proto from Caddy so Keycloak advertises https:// in
      # the discovery doc and token iss when sitting behind a TLS-terminating
      # reverse proxy.
      KC_PROXY_HEADERS: xforwarded
    command: start-dev --http-port=${KEYCLOAK_PORT:-8180} --import-realm
    ports:
      - "${KEYCLOAK_PORT:-8180}:${KEYCLOAK_PORT:-8180}"
    volumes:
      - ./keycloak-realm.json:/opt/keycloak/data/import/vcplatform-realm.json

  wso2is:
    image: wso2/wso2is:7.0.0
    restart: unless-stopped
    ports:
      - "${WSO2_PORT:-9443}:9443"
    environment:
      JAVA_OPTS: "-Xms512m -Xmx1024m"
      # The accountrecoveryendpoint webapp's "Account created
      # successfully" page is OIDC-flow-detached and has no built-in
      # way to send the user back to the originating client. Our
      # patch-signup-redirect.sh script (mounted below) runs in the
      # background at container start, finds the success-page JSP
      # once the WAR is extracted, and injects a meta-refresh tag
      # pointing at this URL. Re-rendered on every ./deploy.sh up so
      # a host change propagates to the redirect target.
      # Resolved by deploy.sh (subdomain mode → https://vc.<domain>/auth,
      # legacy mode → http://<host>:<port>/auth) and exported into the
      # compose env. The default fallback below covers the standalone
      # case where someone runs `docker compose up wso2is` without
      # deploy.sh exporting it.
      SIGNUP_REDIRECT_URL: "${SIGNUP_REDIRECT_URL:-http://${VERIFIABLY_PUBLIC_HOST:-172.24.0.1}:${VERIFIABLY_HOST_PORT:-8080}/auth}"
    # Mount our patched deployment.toml so WSO2 advertises the public
    # hostname + proxy port in its OIDC metadata. Without this, the
    # container uses its baked-in config whose hostname doesn't match
    # what the browser / verifiably-go reaches it as via Caddy.
    volumes:
      - ./wso2-deployment.toml:/home/wso2carbon/wso2is-7.0.0/repository/conf/deployment.toml:ro
      - ./inji/wso2is/patch-signup-redirect.sh:/home/wso2carbon/patch-signup-redirect.sh:ro
    # Wrap the upstream startup script so our background patcher runs
    # alongside the JVM. The patcher polls for the extracted JSP,
    # sed-injects a meta-refresh, and exits — `&` detaches it from the
    # foreground so WSO2's main startup isn't blocked. exec replaces
    # the wrapper process with the upstream entrypoint so PID 1 stays
    # correct.
    #
    # The WSO2 IS 7.0 image's launcher is wso2server.sh (alpine + ubuntu
    # variants both); init.sh exists on some older images but NOT on
    # 7.0 — invoking it returned exit-127 and put the container in a
    # restart loop the first time we tried this.
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        /home/wso2carbon/patch-signup-redirect.sh > /tmp/patch-signup-redirect.log 2>&1 &
        exec /home/wso2carbon/wso2is-7.0.0/bin/wso2server.sh

  libretranslate:
    image: libretranslate/libretranslate:v1.6.5
    restart: unless-stopped
    ports:
      - "${LIBRETRANSLATE_PORT:-5000}:5000"
    environment:
      LT_LOAD_ONLY: "en,es,fr"
    volumes:
      - lt-data:/home/libretranslate/.local

  # ==========================================================================
  # Inji Certify — MOSIP's credential issuance service (OID4VCI)
  # See docker/stack/inji/README.md for full setup documentation
  # ==========================================================================

  certify-postgres:
    image: postgres:15
    restart: unless-stopped
    container_name: certify-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      # Passed to init.sh so did_url rows use the right DID.
      # Empty = dev (did:web:certify-nginx). Set ISSUER_DID_DOMAIN in .env
      # for production federation (did:web:{domain}).
      ISSUER_DID_DOMAIN: ${ISSUER_DID_DOMAIN:-}
    volumes:
      - ./inji/certify/init.sh:/docker-entrypoint-initdb.d/certify_init.sh
      - ./inji/certify/init-authcode.sql:/var/init-templates/certify_init-authcode.sql:ro
      - certify-db:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
      # Fresh-volume initdb + the init scripts can outlast interval*retries (25s)
      # during a busy `up all`, flipping the check to unhealthy mid-init so a
      # dependent service's `depends_on: condition: service_healthy` aborts the
      # first deploy (certify-postgres did this on every clean bring-up). A
      # start_period keeps the container "starting" — failures don't count — until
      # Postgres is genuinely ready, making `up all` succeed first try.
      start_period: 90s

  inji-certify:
    image: injistack/inji-certify-with-plugins:0.14.0
    restart: unless-stopped
    container_name: inji-certify
    user: root
    ports:
      - "8090:8090"
    environment:
      - container_user=mosip
      - active_profile_env=default,postgres-dataprovider
      - SPRING_CONFIG_NAME=certify
      - SPRING_CONFIG_LOCATION=/home/mosip/config/
      - enable_certify_artifactory=false
      - download_hsm_client=false
      # Full DID URL embedded in issued credentials. Empty ISSUER_DID_DOMAIN
      # falls back to Docker-internal did:web:certify-nginx (dev only).
      - CERTIFY_ISSUER_DID=did:web:${ISSUER_DID_DOMAIN:-certify-nginx}
      - ISSUER_DISPLAY_NAME=${ISSUER_DISPLAY_NAME:-VC Infra Issuer}
      - mosip_certify_domain_url=http://certify-nginx:80
      # Route token validation through our local esignet instead of
      # inji-certify's default "I'm my own auth server" mode. The Farmer
      # credential flow originally used inji-certify's Pre-Authorized
      # Code endpoint where certify itself issues the access token. For
      # Inji Web + Mimoto we need the Authorization Code flow, where
      # esignet issues the access token and inji-certify only validates
      # it as a resource server. These four overrides retarget:
      #   - jwk-set-uri → fetches signing keys from esignet (via the
      #     oidc-ui nginx proxy on 172.24.0.1:3005, which forwards
      #     /.well-known/jwks.json to esignet's JWKS endpoint).
      #   - oauth.issuer / authn.issuer-uri → the expected `iss` claim
      #     on the access token. Matches esignet's MOSIP_ESIGNET_DOMAIN_URL.
      #   - access-token.audience stays the default (which is
      #     `${certify.identifier}/v1/certify/issuance/credential` =
      #     http://certify-nginx/v1/certify/issuance/credential) because
      #     we set MOSIP_ESIGNET_CREDENTIAL_SCOPE_RESOURCE_MAPPING on
      #     esignet to the same string, so the `aud` on the token matches.
      # The JWT iss claim that esignet sets is derived from
      # `mosip.esignet.discovery.issuer-id=${domain.url}${server.servlet.path}`
      # which resolves to `http://172.24.0.1:3005/v1/esignet`. So the
      # expected iss on the certify side MUST include the /v1/esignet
      # path — the bare domain URL produces "The iss claim is not valid".
      # The jwk-set-uri is proxied through our oidc-ui nginx which
      # rewrites /.well-known/jwks.json to esignet's internal path, so
      # that URL stays at the bare domain root.
      # ESIGNET_BASE_URL is the public form of eSignet that ends up in
      # Inji Certify's well-known credential-issuer document under
      # authorization_servers. The SPA reads that, fetches that URL's
      # /.well-known/openid-configuration, and redirects users to its
      # authorization_endpoint. So this URL MUST be browser-reachable.
      # Subdomain mode → https://esignet.<domain> (Caddy fronts 443).
      # Legacy mode  → http://<PUBLIC_HOST>:<ESIGNET_PUBLIC_PORT>.
      # deploy.sh exports ESIGNET_BASE_URL through url_for; the fallback
      # below covers the standalone-compose case.
      - mosip_certify_authorization_url=${ESIGNET_BASE_URL:-http://${PUBLIC_HOST:-172.24.0.1}:${ESIGNET_PUBLIC_PORT:-3005}}
      - mosip_certify_authn_issuer_uri=${ESIGNET_BASE_URL:-http://${PUBLIC_HOST:-172.24.0.1}:${ESIGNET_PUBLIC_PORT:-3005}}/v1/esignet
      - mosip_certify_authn_jwk_set_uri=${ESIGNET_BASE_URL:-http://${PUBLIC_HOST:-172.24.0.1}:${ESIGNET_PUBLIC_PORT:-3005}}/.well-known/jwks.json
      - mosip_certify_oauth_issuer=${ESIGNET_BASE_URL:-http://${PUBLIC_HOST:-172.24.0.1}:${ESIGNET_PUBLIC_PORT:-3005}}/v1/esignet
    volumes:
      - ./inji/certify/certify-default.properties:/home/mosip/config/certify-default.properties
      - ./inji/certify/certify-csvdp-farmer.properties:/home/mosip/config/certify-csvdp-farmer.properties
      - ./inji/certify/certify-postgres-dataprovider.properties:/home/mosip/config/certify-postgres-dataprovider.properties
      - ./inji/certify/farmer_identity_data.csv:/home/mosip/config/farmer_identity_data.csv
      - ./inji/certify/vp_request_config.json:/home/mosip/config/vp_request_config.json
      - certify-pkcs12:/home/inji/CERTIFY_PKCS12
    depends_on:
      certify-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8090/v1/certify/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      start_period: 120s
      retries: 10

  # ==========================================================================
  # Inji Certify — PRE-AUTHORIZED CODE FLOW INSTANCE
  #
  # A second, fully isolated Inji Certify deployment whose ONLY purpose is
  # to serve the OID4VCI Pre-Authorized Code flow for pasted-offer wallets
  # (PDF wallet, in-process Local holder, walt.id wallet-as-client, etc.).
  #
  # Why a second instance exists at all: the primary inji-certify is
  # wired for the Authorization Code flow via esignet + Inji Web + Mimoto
  # — its mosip.certify.authn.jwk-set-uri points at esignet's JWKS so it
  # only trusts esignet-issued Bearer tokens at the credential endpoint.
  # That's the right setup for Inji Web's catalog-initiated login flow,
  # but it silently breaks the Pre-Auth Code flow: our localholder exchanges
  # a pre-auth code at inji's own /v1/certify/oauth/token endpoint and gets
  # back a token signed with inji's OWN keys, which then fails signature
  # validation at the credential endpoint with a 401. The two flows cannot
  # coexist on a single instance with a single JWKS trust list.
  #
  # So we run two instances with ZERO shared state — separate Postgres DB
  # (certify-preauth-postgres, different container + different named volume),
  # separate PKCS12 keystore volume (certify-preauth-pkcs12), separate
  # container name, separate host port. The Go issuer-store registry
  # registers this instance as `inji_preauth` and the onboarding wizard
  # labels it clearly as "Inji Certify (Pre-Auth flow)" so the user knows
  # which instance they're picking and why.
  #
  # The only file this instance SHARES with the primary is the bind-mount
  # config files under ./inji/certify/, which are read-only. All writeable
  # state (database + keystore) lives on the isolated volumes above.
  # ==========================================================================
  certify-preauth-postgres:
    image: postgres:15
    restart: unless-stopped
    container_name: certify-preauth-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      # init-preauth.sh computes the seed did_url from these. PREAUTH_DID_DOMAIN
      # (set by deploy.sh in subdomain mode = this instance's own public host)
      # takes precedence so the pre-auth instance gets a PUBLICLY-resolvable
      # did:web that an external wallet can dereference; it falls back to the
      # shared ISSUER_DID_DOMAIN, then to did:web:certify-preauth-nginx (dev).
      PREAUTH_DID_DOMAIN: ${PREAUTH_DID_DOMAIN:-}
      ISSUER_DID_DOMAIN: ${ISSUER_DID_DOMAIN:-}
    volumes:
      - ./inji/certify/init-preauth.sh:/docker-entrypoint-initdb.d/certify_init.sh
      - ./inji/certify/init-preauth.sql:/var/init-templates/certify_init.sql:ro
      - certify-preauth-db:/var/lib/postgresql/data
    ports:
      - "5436:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
      # Fresh-volume initdb + the init scripts can outlast interval*retries (25s)
      # during a busy `up all`, flipping the check to unhealthy mid-init so a
      # dependent service's `depends_on: condition: service_healthy` aborts the
      # first deploy (certify-postgres did this on every clean bring-up). A
      # start_period keeps the container "starting" — failures don't count — until
      # Postgres is genuinely ready, making `up all` succeed first try.
      start_period: 90s

  # inji-preauth-proxy is a thin reverse proxy that takes over the
  # `inji-certify-preauth` network identity. Strict OID4VCI wallets
  # (walt.id's) fetch metadata at `{credential_issuer}/.well-known/...` and
  # sign proof-JWTs with `aud = credential_issuer`. Inji itself advertises
  # `credential_issuer: http://inji-certify-preauth:8090` but only serves
  # metadata under `/v1/certify/issuance/.well-known/...`, and its
  # JwtProofValidator requires proof aud to equal `mosip.certify.identifier`
  # (= the same host). Serving metadata at the ROOT of that host, rewritten
  # to match walt.id's strict parser, squares both constraints without
  # touching Inji's config. See cmd/inji-preauth-proxy/main.go for the
  # intercept rules. Everything else is a transparent httputil reverse proxy.
  inji-preauth-proxy:
    # Source: verifiably-go/cmd/inji-preauth-proxy. BUILT FROM SOURCE so the
    # in-repo fixes (e.g. stripping walt.id's request-injected `display` /
    # empty `credential_definition` that Inji's CredentialRequest DTO rejects)
    # are always present — the published adammwaniki/inji-preauth-poc:v0.1.0
    # predates them. `docker compose up` builds this on a fresh box (the image
    # tag is absent) and reuses it thereafter; `image:` just names the result.
    # Re-publish the tag from this source to restore the pull-only model.
    build:
      context: ../../../cmd/inji-preauth-proxy
    image: adammwaniki/inji-preauth-poc:v0.1.0
    restart: unless-stopped
    container_name: inji-certify-preauth
    ports:
      - "8094:8090"
    environment:
      - UPSTREAM_URL=http://inji-certify-preauth-backend:8090
      - LISTEN_ADDR=:8090
    depends_on:
      - inji-certify-preauth-backend

  inji-certify-preauth-backend:
    image: injistack/inji-certify-with-plugins:0.14.0
    restart: unless-stopped
    container_name: inji-certify-preauth-backend
    user: root
    environment:
      - container_user=mosip
      - active_profile_env=default,csvdp-farmer
      - SPRING_CONFIG_NAME=certify
      - SPRING_CONFIG_LOCATION=/home/mosip/config/
      - enable_certify_artifactory=false
      - download_hsm_client=false
      # Issuer DID baked into the did.json (id/controller) and into every VC's
      # proof verificationMethod. PREAUTH_DID_DOMAIN (deploy.sh, subdomain mode)
      # makes it a publicly-resolvable did:web at THIS instance's own subdomain,
      # so an external wallet can dereference it to verify the proof. It is
      # decoupled from the shared ISSUER_DID_DOMAIN on purpose: moving that var
      # would also re-point the internal primary auth-code instance onto this
      # subdomain's did.json (which carries only the pre-auth key) and break it.
      # Falls back to ISSUER_DID_DOMAIN, then did:web:certify-preauth-nginx (dev).
      - CERTIFY_ISSUER_DID=did:web:${PREAUTH_DID_DOMAIN:-${ISSUER_DID_DOMAIN:-certify-preauth-nginx}}
      - ISSUER_DISPLAY_NAME=${ISSUER_DISPLAY_NAME:-VC Infra Issuer}
      # Critical difference from the primary inji-certify: the domain URL
      # must be the PUBLIC URL so that JwtProofValidator (Nimbus) accepts
      # the wallet's proof JWT whose aud = credential_issuer (the public URL
      # the wallet read from /.well-known/openid-credential-issuer).
      # MOSIP_CERTIFY_AUTHN_JWK_SET_URI is overridden to the INTERNAL address
      # so the backend can still fetch its own JWKS without hairpin NAT.
      - mosip_certify_domain_url=${PREAUTH_PUBLIC_URL:-http://inji-certify-preauth:8090}
      - MOSIP_CERTIFY_AUTHN_JWK_SET_URI=${PREAUTH_JWKS_URI:-http://inji-certify-preauth:8090/v1/certify/.well-known/jwks.json}
      # Point at the isolated postgres instance, not the primary
      # certify-postgres. Zero shared database state.
      - SPRING_DATASOURCE_URL=jdbc:postgresql://certify-preauth-postgres:5432/inji_certify
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
    volumes:
      # Shared READ-ONLY config files — identical between the two instances
      # because the credential types and their claim mappings don't depend
      # on which flow is in use.
      - ./inji/certify/certify-default.properties:/home/mosip/config/certify-default.properties:ro
      # Use the preauth-specific variant that selects PreAuthDataProviderPlugin
      # instead of MockCSVDataProviderPlugin. The preauth plugin reads cached
      # claims from VCICacheService keyed by the access token hash — this is
      # the right behavior for the Pre-Authorized Code flow because claims
      # posted to /pre-authorized-data are stashed on the session and the
      # plugin pulls them back at credential-issuance time without doing any
      # CSV lookup. Mounted as a different filename inside the container so
      # the active profile env var (default,csvdp-farmer) still finds it.
      - ./inji/certify/certify-csvdp-farmer-preauth.properties:/home/mosip/config/certify-csvdp-farmer.properties:ro
      - ./inji/certify/farmer_identity_data.csv:/home/mosip/config/farmer_identity_data.csv:ro
      - ./inji/certify/vp_request_config.json:/home/mosip/config/vp_request_config.json:ro
      # Isolated keystore volume — not shared with primary certify-pkcs12.
      # Mounted at the directory Inji Certify writes to (/home/inji, NOT
      # /home/mosip — the image runs as the inji user, not mosip).
      - certify-preauth-pkcs12:/home/inji/CERTIFY_PKCS12
    depends_on:
      certify-preauth-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8090/v1/certify/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      start_period: 120s
      retries: 10

  certify-nginx:
    image: nginx:1.27
    restart: unless-stopped
    container_name: certify-nginx
    # envsubst renders mimoto-issuers-config.json from the template before
    # nginx starts. The variable list ('$$ISSUER_DISPLAY_NAME') scopes
    # substitution to just that one variable so no other $-patterns in
    # the JSON are accidentally expanded.
    # /config/server/ is read-only (Docker overlay of multiple :ro bind-mounts).
    # Write the rendered JSON to /tmp/ and serve it via an exact-match location
    # in nginx.conf; /config/server/ is still used for all other static files.
    command: >
      /bin/sh -c "envsubst '$$ISSUER_DISPLAY_NAME'
      < /etc/nginx/templates/mimoto-issuers-config.json.tmpl
      > /tmp/mimoto-issuers-config.json
      && exec nginx -g 'daemon off;'"
    environment:
      - ISSUER_DISPLAY_NAME=${ISSUER_DISPLAY_NAME:-Agriculture Department}
    ports:
      - "8091:80"
      - "8443:443"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./inji/certify-nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./inji/certify-nginx/certs/nginx.crt:/etc/nginx/certs/nginx.crt:ro
      - ./inji/certify-nginx/certs/nginx.key:/etc/nginx/certs/nginx.key:ro
      - ./inji/certify-nginx/config/farmer-context.json:/config/server/farmer-context.json:ro
      - ./inji/certify-nginx/config/mimoto-issuers-config.json.tmpl:/etc/nginx/templates/mimoto-issuers-config.json.tmpl:ro
      - ./inji/certify-nginx/config/mimoto-trusted-verifiers.json:/config/server/mimoto-trusted-verifiers.json:ro
      - ./inji/certify-nginx/config/credential-template.html:/config/server/credential-template.html:ro
      - ./inji/certify-nginx/config/vp_request_config.json:/config/server/vp_request_config.json:ro
    depends_on:
      - inji-certify

  # certify-preauth-nginx — parallel to certify-nginx, but serving
  # did:web:certify-preauth-nginx for the PRE-AUTH Inji Certify instance.
  # Listens on :8095 host / :80 container so it doesn't collide with
  # certify-nginx's :8091. The whole point of this service is to make
  # the pre-auth instance's DID document resolvable at a HOSTNAME
  # distinct from the primary's, so kid collisions between the two
  # instances' Ed25519 keypairs (observed on EC2) can no longer strand
  # one flow's verification — each DID resolves only to its own keys.
  certify-preauth-nginx:
    image: nginx:1.27
    restart: unless-stopped
    container_name: certify-preauth-nginx
    ports:
      - "8095:80"
      - "8445:443"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./inji/certify-preauth-nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./inji/certify-preauth-nginx/certs/nginx.crt:/etc/nginx/certs/nginx.crt:ro
      - ./inji/certify-preauth-nginx/certs/nginx.key:/etc/nginx/certs/nginx.key:ro
    depends_on:
      - inji-certify-preauth-backend

  # ==========================================================================
  # Inji Verify — MOSIP's credential verification service (OID4VP)
  # ==========================================================================

  inji-verify-postgres:
    image: postgres:13
    restart: unless-stopped
    container_name: inji-verify-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: inji_verify
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
      # Fresh-volume initdb + the init scripts can outlast interval*retries (25s)
      # during a busy `up all`, flipping the check to unhealthy mid-init so a
      # dependent service's `depends_on: condition: service_healthy` aborts the
      # first deploy (certify-postgres did this on every clean bring-up). A
      # start_period keeps the container "starting" — failures don't count — until
      # Postgres is genuinely ready, making `up all` succeed first try.
      start_period: 90s
    volumes:
      - inji-verify-db:/var/lib/postgresql/data

  inji-verify-service:
    image: mosipid/inji-verify-service:0.16.0
    restart: unless-stopped
    container_name: inji-verify-service
    user: root
    ports:
      - "8082:8080"
    environment:
      - active_profile_env=default
      - DATABASE_HOST=inji-verify-postgres
      - DATABASE_PORT=5432
      - DATABASE_NAME=inji_verify
      - DATABASE_SCHEMA=verify
      - DATABASE_USERNAME=postgres
      - DATABASE_PASSWORD=postgres
      # Derived per-host by deploy.sh (url_for inji-verify): subdomain mode ->
      # https://inji-verify.<domain>/... + did:web:inji-verify.<domain>:...;
      # localhost mode -> http://<host>:<port>/... + did:web:<host>%3A<port>:...
      - INJI_VP_SUBMISSION_BASE_URL=${INJI_VP_SUBMISSION_BASE_URL}
      - INJI_DID_VERIFY_URI=${INJI_DID_VERIFY_URI}
      - INJI_DID_VERIFY_PUBLIC_KEY_URI=${INJI_DID_VERIFY_PUBLIC_KEY_URI}
    volumes:
      - ./inji/certify-nginx/certs/nginx.crt:/tmp/certify-nginx.crt:ro
      # Pre-auth nginx serves did:web:certify-preauth-nginx; import its
      # self-signed cert into Java cacerts so Inji Verify's HTTPS-based
      # did:web resolver can fetch that DID document without TLS errors.
      - ./inji/certify-preauth-nginx/certs/nginx.crt:/tmp/certify-preauth-nginx.crt:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        keytool -importcert -alias certify-nginx -file /tmp/certify-nginx.crt \
          -keystore $$JAVA_HOME/lib/security/cacerts -storepass changeit -noprompt 2>/dev/null || true
        keytool -importcert -alias certify-preauth-nginx -file /tmp/certify-preauth-nginx.crt \
          -keystore $$JAVA_HOME/lib/security/cacerts -storepass changeit -noprompt 2>/dev/null || true
        exec java -jar /home/mosip/verify-service.jar
    depends_on:
      inji-verify-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/v1/verify/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      start_period: 120s
      retries: 10

  inji-verify-ui:
    image: mosipid/inji-verify-ui:0.16.0
    restart: unless-stopped
    container_name: inji-verify-ui
    ports:
      - "3001:8000"
    environment:
      - DEFAULT_TITLE=Inji Verify
      - DEFAULT_LANG=en
      - VERIFIABLE_CLAIMS_CONFIG_URL=/assets/config.json
      - VP_SUBMISSION_SUPPORTED=false
      - DISPLAY_TIMEOUT=120000
    volumes:
      - ./inji/verify/verify-ui-nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - inji-verify-service

  # ==========================================================================
  # Citizens database — mock government registry powering the data source
  # ==========================================================================

  citizens-postgres:
    image: postgres:16.4-alpine
    restart: unless-stopped
    container_name: citizens-postgres
    environment:
      POSTGRES_USER: citizens
      POSTGRES_PASSWORD: citizens
      POSTGRES_DB: citizens
    ports:
      - "5435:5432"
    volumes:
      - ./citizens-db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - citizens-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U citizens"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ==========================================================================
  # Verification Adapter — backend-agnostic verifier
  #
  # Routes by DID method to inji-verify / waltid-verifier-api, or verifies
  # LDP_VC cryptographically in-process via URDNA2015 + Ed25519. SD-JWT
  # with x5c headers is also verified locally (self-contained cert chain).
  # Runs on the same waltid_default network as the rest of the stack so
  # backend URLs use internal docker hostnames.
  #
  # For true air-gap demonstration, run this service with
  #   docker run --rm --network none ... verification-adapter
  # after pre-syncing issuer keys via POST /sync.
  # ==========================================================================

  vc-adapter:
    # Published image: https://hub.docker.com/r/adammwaniki/verification-adapter
    # Source: github.com/credebl/adapter-standalone (backend-agnostic
    # verifier demo). Not currently reached by verifiably-go's own code —
    # runs as a parallel showcase of the backend-agnostic verifier
    # pattern on :8085. Safe to comment out of the `inji`/`all` scenarios
    # if you want to slim the footprint.
    image: adammwaniki/verification-adapter:v0.1.0
    restart: unless-stopped
    container_name: vc-adapter
    ports:
      - "8085:8085"
    environment:
      ADAPTER_PORT: "8085"
      BACKENDS_CONFIG: /app/backends.json
      CACHE_DB: /app/cache/issuer-cache.db
    volumes:
      - ./vc-adapter/backends.json:/app/backends.json:ro
      - vc-adapter-cache:/app/cache
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8085/health"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 3

  # ==========================================================================
  # Registry Admin console — the registrar / data-population tier UI.
  #
  # Reads the credentials an issuer defined in verifiably (via verifiably-go's
  # /api/registry-credentials) and lets an admin populate the authoritative
  # Sunbird RC registry those credentials draw from (one entity per credential
  # type, holder records keyed by the eSignet Individual ID, plus CSV import).
  # It only drives the Sunbird RC HTTP API — it never edits verifiably or the
  # Sunbird registry config. Source lives in deploy/registry-admin/ (built in
  # repo so a fresh clone brings it up). Fronted publicly at
  # registry-admin.<domain> by caddy-public (see gen-caddy.sh entries).
  # ==========================================================================
  registry-admin:
    build:
      context: ../../registry-admin
    image: registry-admin:local
    container_name: registry-admin
    restart: unless-stopped
    environment:
      # verifiably-go's credential catalog (auth-code + custom creds), reached
      # over the shared waltid_default docker network by container DNS.
      VERIFIABLY_SCHEMAS_URL: ${REGISTRY_ADMIN_SCHEMAS_URL:-http://verifiably-go:8080/api/registry-credentials}
      # Sunbird RC registry API. Defaults to the box's published port; override
      # via REGISTRY_ADMIN_SUNBIRD_URL in .env for a different host.
      SUNBIRD_URL: ${REGISTRY_ADMIN_SUNBIRD_URL:-http://156.67.105.185:18091}
    ports:
      # Host port kept for direct/legacy access; in subdomain mode the console
      # is reached via https://registry-admin.<domain> through caddy-public.
      - "${REGISTRY_ADMIN_HOST_PORT:-18095}:8000"

  # ==========================================================================
  # Inji Web stack — MOSIP's browser-hosted wallet, opt-in via `--profile injiweb`.
  #
  # injiweb-ui (injistack/inji-web:0.16.0) serves the React UI on :3004 and
  # proxies /v1/mimoto/* to injiweb-mimoto (the Spring Boot BFF). Mimoto
  # signs private_key_jwt assertions with oidckeystore.p12 (alias
  # wallet-demo-client, password in $INJIWEB_P12_PASSWORD, default
  # xy4gh6swa2i) and posts them to injiweb-esignet, which validates against
  # the JWK we seed via seed-esignet-client.sh. Mock identity verification
  # runs locally in injiweb-mock-identity.
  #
  # Services in this block live on the same waltid_default network as
  # inji-certify and certify-nginx, so Mimoto reaches them by container
  # DNS (no host-gateway juggling). That's the whole point of
  # consolidating this stack into one compose file.
  #
  # Bring-up:
  #   cd docker/injiweb && ./fetch-config.sh   # pulls upstream configs
  #   docker compose -f docker/stack/docker-compose.yml --profile injiweb up -d
  #   docker/injiweb/seed-esignet-client.sh
  # ==========================================================================

  injiweb-postgres:
    image: postgres:15
    restart: unless-stopped
    container_name: injiweb-postgres
    profiles:
      - injiweb
    healthcheck:
      test: ["CMD", "pg_isready", "-q", "-U", "postgres"]
      interval: 5s
      timeout: 2s
      retries: 10
    environment:
      # The init scripts (mimoto_init.sql, esignet_init.sql) are written
      # against the bootstrap superuser `postgres` — they CREATE DATABASE
      # with OWNER = postgres and \c <db> postgres. So we keep the user
      # as `postgres` here and let the scripts create mimoto/esignetuser/
      # mosip_mockidentity roles internally.
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - injiweb-db:/var/lib/postgresql/data
      - ../injiweb/config/mimoto_init.sql:/docker-entrypoint-initdb.d/01-mimoto_init.sql:ro
      - ../injiweb/config/esignet_init.sql:/docker-entrypoint-initdb.d/02-esignet_init.sql:ro

  injiweb-redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    container_name: injiweb-redis
    profiles:
      - injiweb
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 2s
      retries: 5

  injiweb-mock-identity:
    image: mosipid/mock-identity-system:0.10.1
    restart: unless-stopped
    container_name: injiweb-mock-identity
    profiles:
      - injiweb
    user: root
    depends_on:
      injiweb-postgres:
        condition: service_healthy
    ports:
      - "8083:8082"     # 8082 is already taken by inji-verify-service
    # Skip the upstream configure_start.sh — its `if profile != "local"`
    # check matches `default,local` literally and runs an unzip+install
    # branch that renames `client/` to `hsm-client/` on first boot, then
    # fails with "Directory not empty" on every restart because the
    # rename leaves stale state in the writable layer. We can't drop the
    # `default` profile (Spring needs it for properties like
    # `mosip.kernel.keygenerator.symmetric-algorithm-name`), so instead
    # bypass the script and run the JAR directly. The HSM install is
    # unnecessary anyway — `local` profile uses the software keystore at
    # /home/mosip/keystore/mock_local.p12.
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >-
        exec java -jar
        -Dloader.path=$${loader_path_env}
        -Dspring.cloud.config.label=$${spring_config_label_env}
        -Dspring.profiles.active=$${active_profile_env}
        -Dspring.cloud.config.uri=$${spring_config_url_env}
        mock-identity-system.jar
    environment:
      container_user: mosip
      active_profile_env: default,local
      download_hsm_client: "false"
      enable_esignet_artifactory: "false"
      # Same JDK 11.0.16 + cgroupv2 NPE that hits eSignet and Mimoto on
      # this host: ProcessorMetrics → CgroupV2Subsystem.getInstance NPE
      # crashes Spring Boot during context init. Disable container-aware
      # resource probing so the metrics binders fall back to host APIs.
      JAVA_TOOL_OPTIONS: "-XX:-UseContainerSupport"
      SPRING_DATASOURCE_URL: jdbc:postgresql://injiweb-postgres:5432/mosip_mockidentitysystem
      # Connect as the Postgres superuser the init scripts created tables
      # under. The upstream esignet_init.sql doesn't seed per-app roles,
      # so using the superuser is the simplest way to make the service
      # start without patching the init SQL.
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      # Persist mock-identity's kernel keymanager PKCS12 keystore on a
      # named volume instead of the container's writable layer. The
      # default config-path is /home/mosip/mock_local.p12 — but
      # /home/mosip also holds the JAR and entrypoint script, so we
      # can't mount the whole directory. Override the config path to
      # /home/mosip/keystore/mock_local.p12 (a directory we mount
      # cleanly) and the keystore survives container recreation.
      #
      # Without this override the symptom is exactly the same crash
      # as inji-certify and esignet: on container recreate the writable
      # layer is wiped, mock-identity's keymanager finds key alias rows
      # in its postgres schema (mockidentitysystem.key_alias) but no
      # matching alias in the freshly-empty keystore, and exits with
      # NoSuchSecurityProviderException: KER-KMA-004 → No such alias.
      # Mirrors the same fix applied to injiweb-esignet above.
      MOSIP_KERNEL_KEYMANAGER_HSM_CONFIG_PATH: /home/mosip/keystore/mock_local.p12
    volumes:
      - injiweb-mockid-keystore:/home/mosip/keystore

  injiweb-esignet:
    image: mosipid/esignet-with-plugins:1.5.1
    restart: unless-stopped
    container_name: injiweb-esignet
    profiles:
      - injiweb
    # Run as root so the image's entrypoint can drop HSM install steps
    # via download_hsm_client=false without trying to sudo.
    user: root
    depends_on:
      injiweb-postgres:
        condition: service_healthy
      injiweb-redis:
        condition: service_healthy
      injiweb-mock-identity:
        condition: service_started
    ports:
      - "8088:8088"
    environment:
      container_user: mosip
      active_profile_env: default,local
      plugin_name_env: esignet-mock-plugin.jar
      # Suppress the HSM client install step from the image entrypoint —
      # without it the container tries `sudo apt install softhsm` and exits.
      download_hsm_client: "false"
      enable_esignet_artifactory: "false"
      SPRING_DATASOURCE_URL: jdbc:postgresql://injiweb-postgres:5432/mosip_esignet?currentSchema=esignet
      # Upstream esignet_init.sql creates all tables under the `postgres`
      # superuser and never provisions a dedicated esignetuser role —
      # match that reality instead of guessing a password.
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_CACHE_TYPE: redis
      SPRING_REDIS_HOST: injiweb-redis
      SPRING_REDIS_PORT: "6379"
      SPRING_REDIS_PASSWORD: ""
      MOSIP_ESIGNET_MOCK_DOMAIN_URL: http://injiweb-mock-identity:8082
      MOSIP_ESIGNET_INTEGRATION_KEY_BINDER: MockKeyBindingWrapperService
      # Repoint eSignet's "Sign Up with Unified Login" link at verifiably's holder
      # self-registration (the MOSIP signup-service isn't deployed here). Per-host via
      # ESIGNET_UI_SIGNUP_URL (exported by deploy.sh); default = localhost.
      MOSIP_ESIGNET_UI_SIGNUP_CONFIG: "{'signup.banner': true, 'signup.url': '${ESIGNET_UI_SIGNUP_URL:-http://172.24.0.1:8080/holder/register}'}"
      # Rewrite every URL esignet advertises to point at the oidc-ui
      # nginx via an IP that resolves consistently from BOTH the
      # browser AND from inside the Mimoto container.
      #
      # Why not localhost:3005? Mimoto ignores `proxy_token_endpoint`
      # in mimoto-issuers-config.json — it reads the token endpoint
      # directly from esignet's oauth-authorization-server well-known
      # (see IdpServiceImpl.getTokenEndpoint). So whatever esignet
      # advertises is what Mimoto POSTs to. If the URL is
      # `localhost:3005`, Mimoto tries to connect to itself and fails.
      #
      # 172.24.0.1 is the waltid_default network's gateway — it's the
      # docker host's bridge IP. Port 3005 is published on 0.0.0.0
      # (all interfaces) so both paths reach the oidc-ui container:
      #   - Browser on host: http://172.24.0.1:3005 → docker port
      #     forward → injiweb-oidc-ui:3000
      #   - Mimoto inside waltid_default: http://172.24.0.1:3005 →
      #     bridge gateway (host) → docker port forward → same target
      # Same URL, works in both contexts, no /etc/hosts edits needed.
      MOSIP_ESIGNET_DOMAIN_URL: ${ESIGNET_BASE_URL:-http://${PUBLIC_HOST:-172.24.0.1}:${ESIGNET_PUBLIC_PORT:-3005}}
      # Dynamic credential scopes: read from the mounted file so a restart
      # re-reads them (verifiably appends a scope on schema creation).
      SPRING_CONFIG_ADDITIONAL_LOCATION: file:/home/mosip/config/
      # Persist esignet's kernel keymanager PKCS12 keystore into a named
      # volume instead of the container's writable layer. Without this
      # override, esignet uses the local profile default of
      # `esignet_local.p12` relative to /home/mosip, which lives in the
      # container's ephemeral writable layer. On container recreation
      # (e.g. when adding an env var like MOSIP_ESIGNET_DOMAIN_URL) the
      # keystore is wiped, esignet tries to re-generate the master key,
      # can't read it back, and crashes with
      # `NoSuchSecurityProviderException: KER-KMA-004 --> No such alias`.
      MOSIP_KERNEL_KEYMANAGER_HSM_CONFIG_PATH: /home/mosip/keystore/esignet_local.p12
      # Credential scope config — esignet's shipped default is
      # `mosip_identity_vc_ldp` but inji-certify's Farmer credential
      # config declares scope `mock_identity_vc_ldp`. Override the
      # scope allowlist and map it at the access-token audience check
      # layer onto inji-certify's credential endpoint. Without this
      # override, the OIDC authorize request carries an unrecognized
      # scope and esignet returns
      # "The requested scope is not supported."
      # esignet's `credentialScopes` field is injected via
      # `@Value("#{${mosip.esignet.supported.credential.scopes}}")` —
      # a double-layer SpEL expression. The env var must be a SpEL Set
      # literal (curly braces + single-quoted strings) so that after
      # property substitution the expression becomes `#{{'...'}}`
      # which SpEL evaluates to a Java Set. A plain string
      # `mock_identity_vc_ldp` is parsed as a SpEL property reference
      # and fails with EL1008E.
      # MOVED to inji/esignet/credential-scopes.properties (file-based dynamic scopes):
      # MOSIP_ESIGNET_SUPPORTED_CREDENTIAL_SCOPES: "{'mock_identity_vc_ldp','farmer_land_vc_ldp'}"
      # Audience must exactly match inji-certify's
      # mosip.certify.oauth.access-token.audience, which resolves to
      # `${mosip.certify.identifier}/v1/certify/issuance/credential`.
      # Since mosip_certify_domain_url=http://certify-nginx:80, the
      # expected aud is http://certify-nginx:80/v1/certify/issuance/credential
      # — explicit :80 port. Dropping it here causes certify's
      # JwtAudienceValidator to reject with "The aud claim is not valid".
      # MOVED to inji/esignet/credential-scopes.properties (file-based dynamic scopes):
      # MOSIP_ESIGNET_CREDENTIAL_SCOPE_RESOURCE_MAPPING: "{'mock_identity_vc_ldp':'http://certify-nginx:80/v1/certify/issuance/credential','farmer_land_vc_ldp':'http://certify-nginx:80/v1/certify/issuance/credential'}"
    volumes:
      - injiweb-esignet-keystore:/home/mosip/keystore
      - ./inji/esignet/credential-scopes.properties:/home/mosip/config/application-local.properties
      - ./inji/esignet/configure_start.sh:/home/mosip/configure_start.sh:ro

  # esignet's browser-facing React UI. Serves /authorize, /consent, and
  # other login screens, plus a same-origin nginx proxy for /v1/esignet
  # and the three well-known endpoints. Holders land here after the
  # issuer redirects them for OIDC authorization.
  injiweb-oidc-ui:
    image: mosipid/oidc-ui:1.5.1
    restart: unless-stopped
    container_name: injiweb-oidc-ui
    profiles:
      - injiweb
    user: root
    depends_on:
      injiweb-esignet:
        condition: service_started
    ports:
      # Host :3005 → container :3000. Avoids conflict with inji-verify-ui
      # (:3001) and injiweb-ui (:3004). Must match MOSIP_ESIGNET_DOMAIN_URL.
      - "${ESIGNET_PUBLIC_PORT:-3005}:3000"
    environment:
      container_user: mosip
      DEFAULT_WELLKNOWN: '%5B%7B%22name%22%3A%22OpenID%20Configuration%22%2C%22value%22%3A%22%2F.well-known%2Fopenid-configuration%22%7D%2C%7B%22name%22%3A%22Jwks%20Json%22%2C%22value%22%3A%22%2F.well-known%2Fjwks.json%22%7D%2C%7B%22name%22%3A%22Authorization%20Server%22%2C%22value%22%3A%22%2F.well-known%2Foauth-authorization-server%22%7D%5D'
      SIGN_IN_WITH_ESIGNET_PLUGIN_URL: https://raw.githubusercontent.com/mosip/artifactory-ref-impl/master/artifacts/src/mosip-plugins/sign-in-with-esignet/sign-in-with-esignet.zip
    volumes:
      - ../injiweb/config/oidc-ui-nginx.conf:/etc/nginx/nginx.conf:ro
      - ../injiweb/config/oidc-ui-configure-start.sh:/home/mosip/configure_start.sh:ro

  injiweb-minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    restart: unless-stopped
    container_name: injiweb-minio
    profiles:
      - injiweb
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - injiweb-minio:/data

  injiweb-datashare:
    image: mosipid/data-share-service:1.3.0-beta.2
    restart: unless-stopped
    container_name: injiweb-datashare
    profiles:
      - injiweb
    user: root
    depends_on:
      - injiweb-minio
    ports:
      - "8097:8097"
    environment:
      container_user: mosip
      active_profile_env: inji-default,standalone
      SPRING_CONFIG_NAME: data-share
      SPRING_CONFIG_LOCATION: /home/mosip/
      DATASHARE_DOMAIN: injiweb-datashare:8097
      download_hsm_client: "false"
    volumes:
      - ../injiweb/config/data-share-inji-default.properties:/home/mosip/data-share-inji-default.properties:ro
      - ../injiweb/config/data-share-standalone.properties:/home/mosip/data-share-standalone.properties:ro

  injiweb-mimoto:
    image: injistack/mimoto:0.21.0
    restart: unless-stopped
    container_name: injiweb-mimoto
    profiles:
      - injiweb
    user: root
    # The injistack/inji-web image's nginx hardcodes `mimoto-service` as the
    # upstream hostname. Expose that alias so the UI container resolves it
    # without us having to match container_name to the image's assumption.
    networks:
      default:
        aliases:
          - mimoto-service
    depends_on:
      injiweb-postgres:
        condition: service_healthy
      injiweb-datashare:
        condition: service_started
      injiweb-esignet:
        condition: service_started
    ports:
      - "8099:8099"
    environment:
      container_user: mosip
      active_profile_env: default
      download_hsm_client: "false"
      enable_esignet_artifactory: "false"
      SPRING_CONFIG_NAME: mimoto
      SPRING_CONFIG_LOCATION: /home/mosip/
      SPRING_CLOUD_BOOTSTRAP_LOCATION: /home/mosip/mimoto-bootstrap.properties
      SPRING_DATASOURCE_URL: jdbc:postgresql://injiweb-postgres:5432/inji_mimoto
      # Upstream config expects POSTGRES_USER / POSTGRES_PASSWORD env vars
      # which the Spring config files then reference via placeholders.
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      oidc_p12_password: ${INJIWEB_P12_PASSWORD:-xy4gh6swa2i}
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-dummy-client-id}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET:-dummy-client-secret}
      # Trust the certify-nginx self-signed cert so mimoto can resolve
      # the issuer's did:web:certify-nginx document over HTTPS during
      # credential verification. The Eclipse Temurin base image's
      # /__cacert_entrypoint.sh imports every *.crt under /certificates/
      # into the JVM truststore on startup when USE_SYSTEM_CA_CERTS=1.
      # Without this, mimoto receives the credential successfully and
      # then fails verification with PKIX path building failed →
      # "unable to find valid certification path to requested target",
      # surfaced in the inji-web UI as "we were unable to download the
      # card".
      USE_SYSTEM_CA_CERTS: "1"
    volumes:
      - ../injiweb/config/mimoto-default.properties:/home/mosip/mimoto-default.properties:ro
      - ../injiweb/config/mimoto-bootstrap.properties:/home/mosip/mimoto-bootstrap.properties:ro
      # Mimoto's kernel keymanager WRITES master key aliases into the
      # mounted p12 on first boot. Mount the runtime copy (refreshed from
      # the pristine original by fetch-config.sh) as writable so Mimoto
      # can persist those keys without mutating the user's real file.
      - ../injiweb/config/certs-runtime/oidckeystore.p12:/home/mosip/certs/oidckeystore.p12
      # See USE_SYSTEM_CA_CERTS comment above.
      - ./inji/certify-nginx/certs/nginx.crt:/certificates/certify-nginx.crt:ro

  injiweb-ui:
    image: injistack/inji-web:0.16.0
    restart: unless-stopped
    container_name: injiweb-ui
    profiles:
      - injiweb
    # Mimoto's IssuersServiceImpl fetches the issuer catalog from
    # `http://inji-web:3004/mimoto-issuers-config.json` at runtime —
    # upstream names the UI container `inji-web`, not `injiweb-ui`.
    # Expose the alias so Mimoto's hard-coded URL resolves here.
    networks:
      default:
        aliases:
          - inji-web
    depends_on:
      - injiweb-mimoto
    ports:
      # Upstream maps 3004:3004 (the image's nginx listens on 3004, not 80).
      - "${INJIWEB_UI_PUBLIC_PORT:-3004}:3004"
    environment:
      DEFAULT_LANG: en
      # MIMOTO_URL is what the React SPA reads from /env.config.js at
      # runtime to know where to call for the issuer list, OID4VCI offer
      # resolution, etc. In legacy mode this is the public host:port; in
      # subdomain mode deploy.sh exports MIMOTO_URL to the mimoto
      # subdomain (e.g. https://mimoto.bootcamp.cdpi.dev/v1/mimoto)
      # before compose-up so requests hit Caddy → injiweb-mimoto on the
      # right path. Without the override, the SPA hits :3004 which isn't
      # exposed externally in subdomain mode and shows "No issuers found".
      MIMOTO_URL: ${MIMOTO_URL:-http://${PUBLIC_HOST:-localhost}:${INJIWEB_UI_PUBLIC_PORT:-3004}/v1/mimoto}
      IGNORED_ISSUER_IDS: MockMdl
    volumes:
      # The UI container reads the issuer list directly from these JSON
      # files — NOT Mimoto. Our edited version points client_id /
      # client_alias at wallet-demo-client and the token endpoints at
      # our local injiweb-esignet.
      - ../injiweb/config/mimoto-issuers-config.json:/home/mosip/mimoto-issuers-config.json:ro
      - ../injiweb/config/mimoto-trusted-verifiers.json:/home/mosip/mimoto-trusted-verifiers.json:ro
      - ../injiweb/config/credential-template.html:/home/mosip/credential-template.html:ro
      # Override the baked-in nginx config with one that uses Docker's
      # embedded DNS resolver (127.0.0.11) and a per-request proxy_pass
      # variable so nginx re-resolves mimoto-service on every request.
      # Without this, restarting Mimoto gives it a new waltid_default IP
      # and the UI starts returning 502 until nginx is also restarted.
      - ../injiweb/config/injiweb-ui-nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  verifiably-redis-data:
  verifiably-pg-data:
  wallet-db:
  wallet-api-data:
  lt-data:
  certify-db:
  certify-pkcs12:
  inji-verify-db:
  citizens-data:
  vc-adapter-cache:
  injiweb-db:
  injiweb-minio:
  injiweb-esignet-keystore:
  injiweb-mockid-keystore:
  # Pre-auth Inji instance — fully isolated from the primary
  # certify-db / certify-pkcs12 volumes. See the inji-certify-preauth
  # service block for rationale.
  certify-preauth-db:
  certify-preauth-pkcs12:
  # caddy-public's auto-issued certs + ACME state. Persists across
  # restarts so Let's Encrypt's rate limit isn't burned on every redeploy.
  caddy-public-data:
  caddy-public-config:

# Pin the default network to a fixed subnet + gateway so that every service
# URL hardcoded against 172.24.0.1 (esignet MOSIP_ESIGNET_DOMAIN_URL, Mimoto
# authorization_audience, inji-certify authorization.url) keeps working
# across docker compose down/up cycles. Without this pin, Docker picks an
# arbitrary subnet on network creation and the gateway IP can shift,
# breaking the OIDC token flow until every property is hand-edited.
networks:
  default:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.24.0.0/16
          gateway: 172.24.0.1
