# certify-preauth-nginx: mirror of certify-nginx, but scoped to the
# Pre-Authorized Code flow Inji Certify instance (inji-certify-preauth-backend).
#
# Exists so the pre-auth instance's VCs can reference a DISTINCT DID
# (did:web:certify-preauth-nginx) from the primary auth-code instance
# (did:web:certify-nginx). Before this split, both instances signed VCs
# under did:web:certify-nginx, and any kid collision between their two
# Ed25519 keypairs stranded one flow's verification. Two DIDs → two
# did.json documents → zero cross-contamination.
#
# Upstream for /.well-known/did.json is the Go metadata proxy, which
# exposes a preauth-scoped handler at /inji-proxy-preauth/.well-known/did.json.
# The handler fetches the pre-auth backend's own did.json verbatim (no
# merge with the primary instance) and patches in any kids that were
# observed signing VCs along the pre-auth issuance path.

# Use X-Forwarded-Proto (set by Caddy / any TLS-terminating front-proxy) to
# reconstruct the public scheme. Falls back to $scheme for direct access.
map $http_x_forwarded_proto $real_scheme {
    https   https;
    default $scheme;
}

upstream injiproxy {
    server host.docker.internal:8080;
}

server {
    listen 80;
    listen 443 ssl;
    ssl_certificate /etc/nginx/certs/nginx.crt;
    ssl_certificate_key /etc/nginx/certs/nginx.key;

    # Use Docker's embedded DNS resolver so upstream hostnames are
    # re-resolved after a container is recreated (new IP). Without this
    # nginx caches the IP at startup and returns 502 after redeployments
    # that recreate the backend containers.
    resolver 127.0.0.11 valid=30s ipv6=off;
    set $preauth_backend inji-certify-preauth-backend:8090;
    set $preauth_proxy   inji-certify-preauth:8090;

    # Root — serve config static files (mirrors certify-nginx layout).
    location / {
        root /config/server;
        autoindex on;
    }

    # OID4VCI credential endpoint. Route through the inji-preauth-proxy (NOT the
    # backend directly): for EXTERNAL wallets the proxy's serveCredentialRequest
    # aligns the ldp_vc credential_definition (@context/type) to upstream's config
    # — the same proxy path pdf.go drives successfully. (pdf.go hits the proxy
    # directly, so it is unaffected by this nginx route.) No URI on proxy_pass so
    # the exact request path + Authorization/body are forwarded verbatim.
    location = /v1/certify/issuance/credential {
        proxy_pass http://$preauth_proxy;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, Cache-Control' always;
        if ($request_method = 'OPTIONS') { return 204; }
    }

    # credential-offer-data: route through inji-certify-preauth proxy, not directly
    # to the backend. Going directly triggers Spring Security's auth filter chain
    # (InsufficientAuthenticationException) even though the path is in ignore-auth-urls;
    # the proxy forwards requests without the headers that trigger that behaviour.
    location /v1/certify/credential-offer-data/ {
        # proxy_pass MUST omit the URI path here: $preauth_proxy is a variable, and
        # with a variable upstream nginx does NOT append the unmatched request suffix
        # to a proxy_pass URI — so ".../credential-offer-data/<uuid>" was being sent
        # to the upstream as ".../credential-offer-data/" (UUID dropped → backend 404
        # "No static resource credential-offer-data"). With no URI, nginx forwards the
        # original request URI verbatim (UUID included). This is the wallet's FIRST
        # OID4VCI step (resolve the credential_offer_uri); dropping it broke holding.
        proxy_pass http://$preauth_proxy;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Accept-Encoding "";
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, Cache-Control' always;
        if ($request_method = 'OPTIONS') { return 204; }
    }

    # OID4VCI token endpoint — route through the inji-preauth-proxy, NOT the
    # backend directly. Hitting the backend directly through this nginx returns
    # 403 Forbidden (Spring Security rejects the proxied request); the proxy
    # forwards it cleanly (verified: token = 200 via proxy/backend-direct, 403
    # via backend-through-nginx). No URI on proxy_pass so the full
    # /v1/certify/oauth/token path is forwarded verbatim (a variable upstream
    # would otherwise drop the suffix).
    location /v1/certify/oauth/ {
        proxy_pass http://$preauth_proxy;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Accept-Encoding "";
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, Cache-Control' always;
        if ($request_method = 'OPTIONS') { return 204; }
    }

    # Generic pass-through for other pre-auth backend endpoints.
    location /v1/certify/ {
        proxy_pass http://$preauth_backend/v1/certify/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        # Prevent gzip so sub_filter can rewrite JSON bodies.
        proxy_set_header Accept-Encoding "";
        # Rewrite the Docker-internal credential_issuer URL that Inji Certify
        # bakes into credential-offer-data and .well-known responses. Without
        # this the wallet sees http://inji-certify-preauth:8090 and can't reach
        # the token / credential endpoints.

        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, Cache-Control' always;

        if ($request_method = 'OPTIONS') { return 204; }
    }

    # OID4VCI wallet-facing metadata.  Route DIRECTLY to the backend (not the
    # Go inji-preauth-poc proxy) so the per-credential display[] array is
    # preserved — the proxy was stripping it, causing wallets to show the
    # config ID instead of the human-readable credential name.
    # The backend already emits public URLs (mosip_certify_domain_url = public
    # URL), so no internal-URL sub_filter is needed.  The only missing field is
    # token_endpoint (backend omits it); inject it next to credential_issuer.
    location /.well-known/openid-credential-issuer {
        proxy_pass http://$preauth_backend/v1/certify/issuance/.well-known/openid-credential-issuer;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Accept-Encoding "";
        # Inject the token_endpoint the backend omits from this document. No
        # internal-URL rewrite is needed: with mosip_certify_domain_url set to
        # the public URL (PREAUTH_PUBLIC_URL), the backend emits public
        # credential_issuer/credential_endpoint/authorization_servers natively.
        # sub_filter_once stays OFF so the jwk-binding rewrite below applies to
        # every config (the token_endpoint injection targets the single
        # "credential_issuer", so it still happens exactly once).
        sub_filter '"credential_issuer"' '"token_endpoint":"$real_scheme://$host/v1/certify/oauth/token","credential_issuer"';
        # Force jwk binding (the backend advertises did:jwk). With did:jwk the
        # wallet builds a proof JWT carrying an iss claim that Inji Certify can't
        # parse ("invalid_proof: Error encountered during proof jwt parsing"); jwk
        # makes the wallet take the key-proof path (jwk in header, no iss) — the
        # form Certify accepts. Mirrors the inji-preauth-proxy stripDidBindingMethods,
        # but via sub_filter so we keep the backend's display[] (readable names).
        sub_filter '"did:jwk"' '"jwk"';
        sub_filter_once off;
        sub_filter_types application/json;
        add_header 'Access-Control-Allow-Origin' '*' always;
    }

    # did.json — route through the Go proxy's PRE-AUTH handler, which
    # only fetches the pre-auth backend's did.json (never the primary's)
    # and patches in pre-auth-observed kids. This is the whole point of
    # the split: did:web:certify-preauth-nginx resolves to ONLY pre-auth
    # keys, independent of whatever the primary instance is advertising.
    location /.well-known/did.json {
        proxy_pass http://injiproxy/inji-proxy-preauth/.well-known/did.json;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, Cache-Control' always;

        if ($request_method = 'OPTIONS') { return 204; }
    }

    error_page 500 502 503 504  /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
