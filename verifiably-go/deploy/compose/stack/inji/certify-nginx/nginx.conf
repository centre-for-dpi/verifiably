# Upstream to the Go metadata proxy on the host. host.docker.internal is
# provided via docker-compose extra_hosts → host-gateway.
upstream injiproxy {
    server host.docker.internal:8080;
}

server {
    listen 80;
    listen 443 ssl;
    ssl_certificate /etc/nginx/certs/nginx.crt;
    ssl_certificate_key /etc/nginx/certs/nginx.key;

    location / {
        root /config/server;
        autoindex on;
    }

    # Route the credential issuance endpoint through our Go proxy for cross-DPG
    # request-body translation (Walt.id wallet omits some fields Inji requires).
    location = /v1/certify/issuance/credential {
        proxy_pass http://injiproxy/inji-proxy/issuance/credential;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, Cache-Control' always;
        if ($request_method = 'OPTIONS') { return 204; }
    }

    # Proxy API requests to mimoto-service
    location /v1/certify/ {
        proxy_pass http://inji-certify:8090/v1/certify/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Add CORS headers
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, Cache-Control' always;

        # Handle OPTIONS requests (for pre-flight checks)
        if ($request_method = 'OPTIONS') {
            return 204;
        }
    }

    location /.well-known/did.json {
            proxy_pass http://inji-certify:8090/v1/certify/.well-known/did.json;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # Add CORS headers
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, Cache-Control' always;

            # Handle OPTIONS requests (for pre-flight checks)
            if ($request_method = 'OPTIONS') {
                return 204;
            }
        }
    # Route OID4VCI issuer metadata through our Go proxy for shape translation
    # (strips Inji-specific fields that Walt.id's strict parser rejects).
    # The proxy returns transformed JSON that keeps credential_issuer=certify-nginx:80
    # so proof JWTs still validate against Inji's configured domain URL.
    location /.well-known/openid-credential-issuer {
        proxy_pass http://injiproxy/inji-proxy/.well-known/openid-credential-issuer;
        proxy_set_header Host $host;
        proxy_http_version 1.1;

        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, Cache-Control' always;

        if ($request_method = 'OPTIONS') {
            return 204;
        }
    }

    # Serve the envsubst-rendered issuer config from /tmp/ (written at startup).
    # /config/server/ is a read-only Docker overlay; /tmp/ is always writable.
    location = /mimoto-issuers-config.json {
        alias /tmp/mimoto-issuers-config.json;
        add_header 'Content-Type' 'application/json' always;
        add_header 'Access-Control-Allow-Origin' '*' always;
    }

    # Serve farmer JSON-LD context for credential canonicalization.
    location /contexts/farmer-context.json {
        alias /config/server/farmer-context.json;
        add_header 'Content-Type' 'application/ld+json' always;
        add_header 'Access-Control-Allow-Origin' '*' always;
    }

    error_page   500 502 503 504  /50x.html;

    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}