# Farmer CSV Data Provider plugin config — adapted for adapter testing.
# Change from upstream: did-url uses certify-nginx (Docker-internal hostname).

mosip.certify.integration.scan-base-package=io.mosip.certify.mock.integration
mosip.certify.integration.audit-plugin=LoggerAuditService
mosip.certify.integration.vci-plugin=MockVCIssuancePlugin

mosip.certify.mock.vciplugin.verification-method=${mosip.certify.authn.jwk-set-uri}
mosip.certify.mock.authenticator.get-identity-url=http://mock-identity-system:8082/v1/mock-identity-system/identity
mosip.certify.cache.security.algorithm-name=AES/ECB/PKCS5Padding
mosip.certify.cache.secure.individual-id=false
mosip.certify.cache.store.individual-id=true
mosip.certify.identifier=${mosip.certify.domain.url}

# DID URL embedded in issued credentials.
# In dev (CERTIFY_ISSUER_DID not set): did:web:certify-nginx — Docker-internal only.
# In production (ISSUER_DID_DOMAIN set in .env): did:web:{domain} — publicly resolvable.
# Spring Boot resolves ${CERTIFY_ISSUER_DID:default} from the container env var
# injected by docker-compose.yml; the first colon is the key/default separator.
mosip.certify.data-provider-plugin.did-url=${CERTIFY_ISSUER_DID:did:web:certify-nginx}

mosip.certify.plugin-mode=DataProvider
mosip.certify.data-provider-plugin.id-field-prefix-uri=https://mosip.io/credential/
# MockCSVDataProviderPlugin reads identity from farmer_identity_data.csv
# keyed by the access token's `sub` claim. PreAuthDataProviderPlugin
# (the upstream default) expects state in certify's own transaction
# cache — which never gets populated when the auth code is issued by
# an external esignet. Our flow is Authorization Code Flow via the
# Inji Web + esignet + Mimoto chain, so certify has no cache entry.
mosip.certify.integration.data-provider-plugin=PostgresDataProviderPlugin
mosip.certify.status-list.signature-crypto-suite=Ed25519Signature2020

## CSV config
mosip.certify.data-provider-plugin.rendering-template-id=
mosip.certify.credential-config.issuer.display={\
  {\
    'name': '${ISSUER_DISPLAY_NAME:VC Infra Issuer}',\
    'locale': 'en'\
  }\
}

# --- PostgreSQL data provider (verifiably dynamic claims) ------------------
# Claims are read from certify.vc_subject keyed by the eSignet token `sub` (:id).
# One mapping per credential scope; the query string is taken verbatim.
mosip.certify.data-provider-plugin.postgres.scope-query-mapping={'mock_identity_vc_ldp':'select "fullName", "givenName", "familyName", "gender", "dateOfBirth", "email", "phoneNumber" from certify.vc_subject_person where individual_id=:id'}

# --- eSignet token validation (subdomain, reachable via the caddy-public ---
# esignet alias). The upstream default derives authn.* from
# ${mosip.certify.authorization.url}, but the lowercase env var does NOT bind
# to that dotted property, so it falls back to the legacy host:port default and
# the JWK fetch hairpins/times out -> 'Full authentication is required'.
# Reference the env var by its exact name so Certify validates eSignet tokens
# against the correct public issuer + JWK set. Generic: derives from the env.
mosip.certify.authorization.url=${mosip_certify_authorization_url}
mosip.certify.authn.issuer-uri=${mosip_certify_authorization_url}
mosip.certify.authn.jwk-set-uri=${mosip_certify_authorization_url}/.well-known/jwks.json
