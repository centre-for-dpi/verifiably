# Farmer CSV Data Provider plugin config — pre-auth variant.
# Change from upstream: did-url uses certify-preauth-nginx (Docker-internal
# hostname) so the VCs this instance signs reference a DID distinct from
# the primary auth-code instance's did:web:certify-nginx. Before the split,
# both instances signed under did:web:certify-nginx and collided on kid,
# which meant the first-wins DID resolver would strand one flow's
# verification. Each instance now owns its own DID document, served by
# its own nginx, advertising its own keys — zero cross-contamination.

mosip.certify.integration.scan-base-package=io.mosip.certify.mock.integration
mosip.certify.integration.audit-plugin=LoggerAuditService
mosip.certify.integration.vci-plugin=MockVCIssuancePlugin

mosip.certify.mock.vciplugin.verification-method=${mosip.certify.authn.jwk-set-uri}
mosip.certify.mock.authenticator.get-identity-url=http://mock-identity-system:8082/v1/mock-identity-system/identity
mosip.certify.cache.security.algorithm-name=AES/ECB/PKCS5Padding
mosip.certify.cache.secure.individual-id=false
mosip.certify.cache.store.individual-id=true
mosip.certify.identifier=${mosip.certify.domain.url}

# DID URL embedded in issued credentials for the pre-auth instance.
# In dev (CERTIFY_ISSUER_DID not set): did:web:certify-preauth-nginx — Docker-internal.
# In production (ISSUER_DID_DOMAIN set): did:web:{domain} — same as primary; inji_proxy
# merges both instances' keys into one DID Document so verifiers see a single issuer.
mosip.certify.data-provider-plugin.did-url=${CERTIFY_ISSUER_DID:did:web:certify-preauth-nginx}

mosip.certify.plugin-mode=DataProvider
mosip.certify.data-provider-plugin.id-field-prefix-uri=https://mosip.io/credential/
# PreAuthDataProviderPlugin reads the staged claims from Inji's
# VCICacheService at credential-issuance time, keyed by the access
# token hash. It's the right plugin for the OID4VCI Pre-Authorized
# Code flow because the holder posts claims directly via
# /v1/certify/pre-authorized-data (with a tx_code) and certify caches
# them on the resulting session — no CSV lookup, no individualId
# resolution. The bean lives inside certify-service.jar as
# io.mosip.certify.services.PreAuthIssuanceServiceImpl, activated by
# @ConditionalOnProperty(value="mosip.certify.integration.data-provider-plugin",
# havingValue="PreAuthDataProviderPlugin"). The class name doesn't
# match the bean name, which is why naive filename greps miss it.
#
# The primary inji-certify instance (port 8090) deliberately stays on
# MockCSVDataProviderPlugin because it's wired for the OAuth2 Auth
# Code flow via esignet + Inji Web, where the holder authenticates
# against esignet's OTP and certify has no Pre-Auth cache entry to
# read from — the CSV lookup against the access token's `sub` is
# how Inji's farmer demo reaches the seeded identity data.
mosip.certify.integration.data-provider-plugin=PreAuthDataProviderPlugin
mosip.certify.status-list.signature-crypto-suite=Ed25519Signature2020

## CSV config
mosip.certify.mock.data-provider.csv.identifier-column=id
mosip.certify.mock.data-provider.csv.data-columns=id,fullName,mobileNumber,dateOfBirth,gender,state,district,villageOrTown,postalCode,landArea,landOwnershipType,primaryCropType,secondaryCropType,face,farmerID
mosip.certify.mock.data-provider.csv-registry-uri=/home/mosip/config/farmer_identity_data.csv
mosip.certify.data-provider-plugin.rendering-template-id=
mosip.certify.credential-config.issuer.display={\
  {\
    'name': '${ISSUER_DISPLAY_NAME:VC Infra Issuer}',\
    'locale': 'en'\
  }\
}
mosip.certify.indexed-mappings.state=$.state
mosip.certify.indexed-mappings.district=$.district
