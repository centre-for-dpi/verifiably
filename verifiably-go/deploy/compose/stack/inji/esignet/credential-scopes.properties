# eSignet credential-scope config -- FILE-BASED so scopes can be added on the fly.
# verifiably's issuer schema-creation rewrites this file + restarts eSignet (the same
# pattern the walt.id side uses for its HOCON catalog). Mounted to
# /home/mosip/config/application.properties and loaded via SPRING_CONFIG_ADDITIONAL_LOCATION
# (additional-location > the jar's bundled config). The MOSIP_ESIGNET_*_SCOPES env vars
# were removed from docker-compose.yml so this file is authoritative.
#
# One entry per credential scope (Flow B appends a line-pair per new schema):
mosip.esignet.supported.credential.scopes={'mock_identity_vc_ldp'}
mosip.esignet.credential.scope-resource-mapping={'mock_identity_vc_ldp':'http://certify-nginx:80/v1/certify/issuance/credential'}
