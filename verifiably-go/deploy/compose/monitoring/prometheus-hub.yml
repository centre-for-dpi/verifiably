global:
  scrape_interval: 30s
  evaluation_interval: 30s
  external_labels:
    environment: hub

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:

  # ── Hub's own verifiably-go instance ──────────────────────────────────────
  - job_name: verifiably-hub
    scrape_interval: 15s
    scrape_timeout: 10s
    metrics_path: /metrics
    static_configs:
      - targets: ['verifiably-go:8080']
        labels:
          component: hub
    # Uncomment if VERIFIABLY_API_KEYS is set on the Hub:
    # authorization:
    #   type: Bearer
    #   credentials: <hub-api-key>

  # ── Federation members (dynamic, file_sd hot-reload) ──────────────────────
  # federation-targets.json is generated by generate-federation-prometheus.sh.
  # Prometheus watches the file and reloads automatically — no restart needed.
  #
  # Generate or refresh:
  #   ./deploy/compose/monitoring/generate-federation-prometheus.sh \
  #       config/federation.json \
  #       > deploy/compose/monitoring/federation-targets.json
  #   docker compose exec prometheus curl -sX POST http://localhost:9090/-/reload
  #
  # Each entry in federation-targets.json gets labels:
  #   issuer_did, issuer_name, __scheme__ (https/http), __address__
  - job_name: verifiably-federation
    scrape_interval: 30s
    scrape_timeout: 15s
    metrics_path: /metrics
    honor_labels: true
    file_sd_configs:
      - files: ['/etc/prometheus/federation-targets.json']
        refresh_interval: 5m
    # If issuer deployments protect /metrics with an API key, configure it
    # per-target using __param_ labels in the targets file, or use a shared
    # bearer token here (only if all issuers share the same key):
    # authorization:
    #   type: Bearer
    #   credentials: <shared-metrics-key>
    relabel_configs:
      # Preserve issuer_did and issuer_name as-is (they come from the targets file).
      - source_labels: [issuer_name]
        target_label: issuer_name
      - source_labels: [issuer_did]
        target_label: issuer_did
