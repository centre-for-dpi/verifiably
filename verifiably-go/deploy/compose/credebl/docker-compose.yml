# =============================================================================
# verifiably-go — CREDEBL compose stack
# -----------------------------------------------------------------------------
# Brought up by deploy.sh with --profile credebl.
# All services join the shared `waltid_default` network so they can reach
# keycloak, verifiably-go, and any other DPG running in the same compose project.
#
# Key design decisions vs. cdpi-poc/credebl/docker-compose.yml:
#   - No Keycloak service — uses the shared keycloak container on port 8180.
#   - api-gateway binds ${CREDEBL_API_PORT:-5001}:5000 (5000 conflicts with LibreTranslate).
#   - Postgres, Redis, NATS: no host port bindings (internal only).
#   - MinIO console: 9002:9000, ${CREDEBL_MINIO_CONSOLE_PORT:-9013}:9001
#   - Mailpit: 1027:1025, 8027:8025 (avoid conflict with waltid-stack mailpit if any)
#   - schema-file-server and oob-redirector: internal only.
#   - All volumes named credebl_* to avoid conflict with waltid_* volumes.
#   - env_file: ../config/credebl.env (generated by deploy.sh; required: false so down works before first up).
#   - Agent-runtime bind mounts: ${CREDEBL_COMPOSE_DIR}/.agent-runtime/
#     (CREDEBL_COMPOSE_DIR is set by deploy.sh to the abs path of this dir).
# =============================================================================

# ---------------------------------------------------------------------------
# Infrastructure services
# ---------------------------------------------------------------------------
services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  credebl-postgres:
    image: postgres:16-alpine
    container_name: credebl-postgres
    restart: unless-stopped
    profiles: ["credebl"]
    env_file:
      - path: ${CREDEBL_COMPOSE_DIR}/config/credebl.env
        required: false
    environment:
      POSTGRES_USER: credebl
      POSTGRES_DB: credebl
    volumes:
      - credebl_postgres_data:/var/lib/postgresql/data
      - ${CREDEBL_COMPOSE_DIR}/config/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U credebl -d credebl"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

    deploy:
      resources:
        limits:
          memory: 512M

  # ── Redis ───────────────────────────────────────────────────────────────────
  credebl-redis:
    image: redis:7.4-alpine
    container_name: credebl-redis
    restart: unless-stopped
    profiles: ["credebl"]
    command: redis-server --save 20 1 --loglevel warning
    volumes:
      - credebl_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

    deploy:
      resources:
        limits:
          memory: 256M

  # ── NATS ────────────────────────────────────────────────────────────────────
  credebl-nats:
    image: nats:2.10-alpine
    container_name: credebl-nats
    restart: unless-stopped
    profiles: ["credebl"]
    command: ["--jetstream", "--store_dir=/data", "-m", "8222", "-DV"]
    volumes:
      - credebl_nats_data:/data
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

    deploy:
      resources:
        limits:
          memory: 256M

  # ── MinIO (S3-compatible — replaces AWS S3) ─────────────────────────────────
  credebl-minio:
    image: minio/minio:latest
    container_name: credebl-minio
    restart: unless-stopped
    profiles: ["credebl"]
    command: server /data --console-address ":9001"
    env_file:
      - path: ${CREDEBL_COMPOSE_DIR}/config/credebl.env
        required: false
    environment:
      MINIO_ROOT_USER: minioadmin
    volumes:
      - credebl_minio_data:/data
    ports:
      - "9002:9000"
      - "${CREDEBL_MINIO_CONSOLE_PORT:-9013}:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

    deploy:
      resources:
        limits:
          memory: 512M

  # ── MinIO setup (creates buckets and access keys) ───────────────────────────
  credebl-minio-setup:
    image: minio/mc:latest
    container_name: credebl-minio-setup
    restart: "no"
    profiles: ["credebl"]
    depends_on:
      credebl-minio:
        condition: service_healthy
    env_file:
      - path: ${CREDEBL_COMPOSE_DIR}/config/credebl.env
        required: false
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_BUCKET: credebl-bucket
    entrypoint:
      - /bin/sh
      - -ec
      - |
        : "$${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}"
        : "$${AWS_ACCESS_KEY_ID:?AWS_ACCESS_KEY_ID is required}"
        : "$${AWS_SECRET_ACCESS_KEY:?AWS_SECRET_ACCESS_KEY is required}"
        mc alias set local http://credebl-minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}"
        mc mb --ignore-existing "local/$${MINIO_BUCKET}"
        mc mb --ignore-existing "local/$${MINIO_BUCKET}/default"
        mc mb --ignore-existing "local/$${MINIO_BUCKET}/persist"
        mc mb --ignore-existing "local/$${MINIO_BUCKET}/orgLogos"
        mc anonymous set public "local/$${MINIO_BUCKET}/default"
        mc anonymous set public "local/$${MINIO_BUCKET}/orgLogos"
        mc admin user info local "$${AWS_ACCESS_KEY_ID}" >/dev/null 2>&1 || \
          mc admin user add local "$${AWS_ACCESS_KEY_ID}" "$${AWS_SECRET_ACCESS_KEY}"
        mc admin policy attach local readwrite --user "$${AWS_ACCESS_KEY_ID}"
        echo 'MinIO setup complete'


  # ── Mailpit (SMTP mock — replaces SendGrid) ─────────────────────────────────
  credebl-mailpit:
    image: axllent/mailpit:latest
    container_name: credebl-mailpit
    restart: unless-stopped
    profiles: ["credebl"]
    ports:
      - "1027:1025"
      - "8027:8025"

    deploy:
      resources:
        limits:
          memory: 128M

  # ── Schema File Server ──────────────────────────────────────────────────────
  credebl-schema-file-server:
    image: ghcr.io/credebl/schema-file-server:latest
    container_name: credebl-schema-file-server
    user: "0:0"
    restart: unless-stopped
    profiles: ["credebl"]
    env_file:
      - path: ${CREDEBL_COMPOSE_DIR}/config/credebl.env
        required: false
    environment:
      # schema-file-server expects CRYPTO_PRIVATE_KEY as base64 of the raw key.
      # CREDEBL_SCHEMA_FILE_SERVER_CRYPTO_KEY is computed by ensure_credebl_env()
      # and exported to the shell before `docker compose up`. The fallback is
      # base64("cdpi-poc-crypto-key-change-me") — the deploy.sh default key.
      CRYPTO_PRIVATE_KEY: "${CREDEBL_SCHEMA_FILE_SERVER_CRYPTO_KEY:-Y2RwaS1wb2MtY3J5cHRvLWtleS1jaGFuZ2UtbWU=}"
    depends_on:
      credebl-postgres:
        condition: service_healthy

    deploy:
      resources:
        limits:
          memory: 256M

  # ── OOB Redirector ──────────────────────────────────────────────────────────
  # Resolves the DIDComm OOB QR problem: CREDEBL stores the OOB invitation URL
  # in MinIO and puts the MinIO URL in the QR code. Mobile wallets can't use a
  # MinIO URL directly. This service accepts GET /default/<uuid>, fetches the
  # MinIO object, and returns a 302 redirect to the real OOB invitation URL.
  credebl-oob-redirector:
    image: python:3.12-alpine
    container_name: credebl-oob-redirector
    restart: unless-stopped
    profiles: ["credebl"]
    command: ["python3", "/oob-redirect.py"]
    volumes:
      - ${CREDEBL_COMPOSE_DIR}/oob-redirect.py:/oob-redirect.py:ro
    depends_on:
      - credebl-minio

    deploy:
      resources:
        limits:
          memory: 64M

  # ---------------------------------------------------------------------------
  # CREDEBL Platform services
  # ---------------------------------------------------------------------------

  # ── Seed (runs once, populates DB, then exits) ──────────────────────────────
  credebl-seed:
    image: ghcr.io/credebl/seed:latest
    container_name: credebl-seed
    restart: "no"
    profiles: ["credebl"]
    user: "0:0"
    command: >
      sh -c 'mkdir -p /app/prisma/data &&
      ln -sfn /app/libs/prisma-service/prisma/data/geo-location-master-data /app/prisma/data/geo-location-master-data &&
      npx prisma migrate deploy --schema=./libs/prisma-service/prisma/schema.prisma &&
      npx ts-node ./libs/prisma-service/prisma/seed.ts'
    env_file:
      - path: ${CREDEBL_COMPOSE_DIR}/config/credebl.env
        required: false
    extra_hosts:
      localhost: "host-gateway"
    volumes:
      - ${CREDEBL_COMPOSE_DIR}/config/credebl-master-table.json:/app/prisma/data/credebl-master-table/credebl-master-table.json:ro
    depends_on:
      credebl-postgres:
        condition: service_healthy


  # ── Platform admin bootstrap sync ───────────────────────────────────────────
  credebl-platform-admin-bootstrap:
    image: postgres:16-alpine
    container_name: credebl-platform-admin-bootstrap
    restart: "no"
    profiles: ["credebl"]
    env_file:
      - path: ${CREDEBL_COMPOSE_DIR}/config/credebl.env
        required: false
    entrypoint:
      - /bin/sh
      - -c
      - apk add --no-cache curl jq >/dev/null && /bin/sh /work/bootstrap-platform-admin.sh
    extra_hosts:
      localhost: "host-gateway"
    volumes:
      - ${CREDEBL_COMPOSE_DIR}/bootstrap-platform-admin.sh:/work/bootstrap-platform-admin.sh:ro
    depends_on:
      credebl-postgres:
        condition: service_healthy
      credebl-seed:
        condition: service_completed_successfully

    deploy:
      resources:
        limits:
          memory: 128M

  # ── API Gateway ─────────────────────────────────────────────────────────────
  credebl-api-gateway:
    image: ghcr.io/credebl/api-gateway:latest
    container_name: credebl-api-gateway
    restart: unless-stopped
    profiles: ["credebl"]
    env_file:
      - path: ${CREDEBL_COMPOSE_DIR}/config/credebl.env
        required: false
    environment:
      OOB_BATCH_SIZE: "50"
      PROOF_REQ_CONN_LIMIT: "50"
    extra_hosts:
      localhost: "host-gateway"
    ports:
      - "${CREDEBL_API_PORT:-5001}:5000"
    depends_on:
      credebl-nats:
        condition: service_healthy
      credebl-redis:
        condition: service_healthy
      credebl-seed:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:5000/',(r)=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

    deploy:
      resources:
        limits:
          memory: 512M

  # ── User service ────────────────────────────────────────────────────────────
  credebl-user:
    image: ghcr.io/credebl/user:latest
    container_name: credebl-user
    restart: unless-stopped
    profiles: ["credebl"]
    env_file:
      - path: ${CREDEBL_COMPOSE_DIR}/config/credebl.env
        required: false
    extra_hosts:
      localhost: "host-gateway"
    depends_on:
      credebl-nats:
        condition: service_healthy
      credebl-api-gateway:
        condition: service_healthy
      credebl-platform-admin-bootstrap:
        condition: service_completed_successfully

    deploy:
      resources:
        limits:
          memory: 256M

  # ── Utility service ─────────────────────────────────────────────────────────
  credebl-utility:
    image: ghcr.io/credebl/utility:latest
    container_name: credebl-utility
    restart: unless-stopped
    profiles: ["credebl"]
    env_file:
      - path: ${CREDEBL_COMPOSE_DIR}/config/credebl.env
        required: false
    environment:
      AWS_SDK_LOAD_CONFIG: "1"
    volumes:
      - ${CREDEBL_COMPOSE_DIR}/config/aws/config:/root/.aws/config:ro
    depends_on:
      credebl-nats:
        condition: service_healthy
      credebl-api-gateway:
        condition: service_healthy

    deploy:
      resources:
        limits:
          memory: 256M

  # ── Connection service ──────────────────────────────────────────────────────
  credebl-connection:
    image: ghcr.io/credebl/connection:latest
    container_name: credebl-connection
    restart: unless-stopped
    profiles: ["credebl"]
    env_file:
      - path: ${CREDEBL_COMPOSE_DIR}/config/credebl.env
        required: false
    extra_hosts:
      localhost: "host-gateway"
    depends_on:
      credebl-nats:
        condition: service_healthy
      credebl-api-gateway:
        condition: service_healthy
      credebl-utility:
        condition: service_started
      credebl-user:
        condition: service_started

    deploy:
      resources:
        limits:
          memory: 256M

  # ── Issuance service ────────────────────────────────────────────────────────
  credebl-issuance:
    image: ghcr.io/credebl/issuance:latest
    container_name: credebl-issuance
    restart: unless-stopped
    profiles: ["credebl"]
    env_file:
      - path: ${CREDEBL_COMPOSE_DIR}/config/credebl.env
        required: false
    extra_hosts:
      localhost: "host-gateway"
    environment:
      OOB_BATCH_SIZE: "50"
    depends_on:
      credebl-nats:
        condition: service_healthy
      credebl-redis:
        condition: service_healthy
      credebl-api-gateway:
        condition: service_healthy
      credebl-user:
        condition: service_started
      credebl-connection:
        condition: service_started

    deploy:
      resources:
        limits:
          memory: 384M

  # ── Ledger service ──────────────────────────────────────────────────────────
  credebl-ledger:
    image: ghcr.io/credebl/ledger:latest
    container_name: credebl-ledger
    restart: unless-stopped
    profiles: ["credebl"]
    env_file:
      - path: ${CREDEBL_COMPOSE_DIR}/config/credebl.env
        required: false
    extra_hosts:
      localhost: "host-gateway"
    depends_on:
      credebl-nats:
        condition: service_healthy
      credebl-api-gateway:
        condition: service_healthy
      credebl-user:
        condition: service_started
      credebl-connection:
        condition: service_started
      credebl-issuance:
        condition: service_started

    deploy:
      resources:
        limits:
          memory: 256M

  # ── Organization service ────────────────────────────────────────────────────
  credebl-organization:
    image: ghcr.io/credebl/organization:latest
    container_name: credebl-organization
    restart: unless-stopped
    profiles: ["credebl"]
    env_file:
      - path: ${CREDEBL_COMPOSE_DIR}/config/credebl.env
        required: false
    extra_hosts:
      localhost: "host-gateway"
    depends_on:
      credebl-nats:
        condition: service_healthy
      credebl-api-gateway:
        condition: service_healthy
      credebl-user:
        condition: service_started
      credebl-connection:
        condition: service_started
      credebl-issuance:
        condition: service_started
      credebl-ledger:
        condition: service_started

    deploy:
      resources:
        limits:
          memory: 384M

  # ── Verification service ────────────────────────────────────────────────────
  credebl-verification:
    image: ghcr.io/credebl/verification:latest
    container_name: credebl-verification
    restart: unless-stopped
    profiles: ["credebl"]
    env_file:
      - path: ${CREDEBL_COMPOSE_DIR}/config/credebl.env
        required: false
    extra_hosts:
      localhost: "host-gateway"
    environment:
      PROOF_REQ_CONN_LIMIT: "50"
    depends_on:
      credebl-nats:
        condition: service_healthy
      credebl-api-gateway:
        condition: service_healthy
      credebl-user:
        condition: service_started
      credebl-connection:
        condition: service_started
      credebl-issuance:
        condition: service_started
      credebl-ledger:
        condition: service_started
      credebl-organization:
        condition: service_started

    deploy:
      resources:
        limits:
          memory: 384M

  # ── Agent Provisioning ──────────────────────────────────────────────────────
  credebl-agent-provisioning:
    image: ghcr.io/credebl/agent-provisioning:latest
    container_name: credebl-agent-provisioning
    restart: unless-stopped
    profiles: ["credebl"]
    env_file:
      - path: ${CREDEBL_COMPOSE_DIR}/config/credebl.env
        required: false
    environment:
      ROOT_PATH: ${CREDEBL_COMPOSE_DIR:-.}/.agent-runtime/agent-config
      INBOUND_PORT_START: "9200"
      AFJ_VERSION: ghcr.io/credebl/credo-controller:latest
      AFJ_AGENT_SPIN_UP: /agent-provisioning/AFJ/scripts/docker_start_agent.sh
      AFJ_AGENT_ENDPOINT_PATH: /agent-provisioning/AFJ/endpoints/
    volumes:
      - ${CREDEBL_COMPOSE_DIR:-.}/.agent-runtime/agent-config:/app/agent-provisioning/AFJ/agent-config
      - ${CREDEBL_COMPOSE_DIR:-.}/.agent-runtime/token:/app/agent-provisioning/AFJ/token
      - ${CREDEBL_COMPOSE_DIR:-.}/.agent-runtime/endpoints:/app/agent-provisioning/AFJ/endpoints
      - ${CREDEBL_COMPOSE_DIR:-.}/.agent-runtime/agent.env:/app/agent.env:ro
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "sh", "-c", "pgrep -f 'node.*main' > /dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 90s
    depends_on:
      credebl-nats:
        condition: service_healthy
      credebl-api-gateway:
        condition: service_healthy
      credebl-organization:
        condition: service_started
      credebl-verification:
        condition: service_started

    deploy:
      resources:
        limits:
          memory: 512M

  # ── Agent Service ───────────────────────────────────────────────────────────
  credebl-agent-service:
    image: ghcr.io/credebl/agent-service:latest
    container_name: credebl-agent-service
    restart: unless-stopped
    profiles: ["credebl"]
    env_file:
      - path: ${CREDEBL_COMPOSE_DIR}/config/credebl.env
        required: false
    extra_hosts:
      localhost: "host-gateway"
    environment:
      WALLET_STORAGE_HOST: "172.17.0.1"
      WALLET_STORAGE_PORT: "5432"
      WALLET_STORAGE_USER: credebl
      AGENT_PROTOCOL: http
      AFJ_VERSION: ghcr.io/credebl/credo-controller:latest
      SOCKET_HOST: http://credebl-api-gateway:5000
    command: >
      sh -ec '
        : "$${PLATFORM_WALLET_NAME:?PLATFORM_WALLET_NAME is required}";
        : "$${PLATFORM_WALLET_PASSWORD:?PLATFORM_WALLET_PASSWORD is required}";
        : "$${AGENT_API_KEY:?AGENT_API_KEY is required}";
        : "$${WALLET_STORAGE_HOST:?WALLET_STORAGE_HOST is required}";
        : "$${WALLET_STORAGE_PORT:?WALLET_STORAGE_PORT is required}";
        : "$${WALLET_STORAGE_USER:?WALLET_STORAGE_USER is required}";
        : "$${WALLET_STORAGE_PASSWORD:?WALLET_STORAGE_PASSWORD is required}";
        : "$${SOCKET_HOST:?SOCKET_HOST is required}";
        : "$${AFJ_VERSION:?AFJ_VERSION is required}";
        sleep 30 && node dist/apps/agent-service/main.js
      '
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${CREDEBL_COMPOSE_DIR:-.}/.agent-runtime/agent-config:/app/agent-provisioning/AFJ/agent-config
      - ${CREDEBL_COMPOSE_DIR:-.}/.agent-runtime/token:/app/agent-provisioning/AFJ/token
    depends_on:
      credebl-agent-provisioning:
        condition: service_healthy
      credebl-platform-admin-bootstrap:
        condition: service_completed_successfully

    deploy:
      resources:
        limits:
          memory: 512M

  # ── Cloud Wallet (required for Studio shared-wallet / create-tenant) ──────
  credebl-cloud-wallet:
    image: ghcr.io/credebl/cloud-wallet:latest
    container_name: credebl-cloud-wallet
    restart: unless-stopped
    profiles: ["credebl"]
    env_file:
      - path: ${CREDEBL_COMPOSE_DIR}/config/credebl.env
        required: false
    extra_hosts:
      localhost: "host-gateway"
    depends_on:
      credebl-nats:
        condition: service_healthy
      credebl-api-gateway:
        condition: service_healthy

    deploy:
      resources:
        limits:
          memory: 256M

  # ── OID4VC Issuance service (SD-JWT OID4VCI) ────────────────────────────────
  credebl-oid4vc-issuance:
    image: ghcr.io/credebl/oid4vc-issuance:latest
    container_name: credebl-oid4vc-issuance
    restart: unless-stopped
    profiles: ["credebl"]
    env_file:
      - path: ${CREDEBL_COMPOSE_DIR}/config/credebl.env
        required: false
    extra_hosts:
      localhost: "host-gateway"
    depends_on:
      credebl-nats:
        condition: service_healthy
      credebl-api-gateway:
        condition: service_healthy
      credebl-issuance:
        condition: service_started

    deploy:
      resources:
        limits:
          memory: 256M

  # ── OID4VC Verification service (OID4VP) ─────────────────────────────────────
  credebl-oid4vc-verification:
    image: ghcr.io/credebl/oid4vc-verification:latest
    container_name: credebl-oid4vc-verification
    restart: unless-stopped
    profiles: ["credebl"]
    env_file:
      - path: ${CREDEBL_COMPOSE_DIR}/config/credebl.env
        required: false
    extra_hosts:
      localhost: "host-gateway"
    depends_on:
      credebl-nats:
        condition: service_healthy
      credebl-api-gateway:
        condition: service_healthy
      credebl-verification:
        condition: service_started

    deploy:
      resources:
        limits:
          memory: 256M

  # ── Ecosystem service ────────────────────────────────────────────────────────
  credebl-ecosystem:
    image: ghcr.io/credebl/ecosystem:latest
    container_name: credebl-ecosystem
    restart: unless-stopped
    profiles: ["credebl"]
    env_file:
      - path: ${CREDEBL_COMPOSE_DIR}/config/credebl.env
        required: false
    extra_hosts:
      localhost: "host-gateway"
    depends_on:
      credebl-nats:
        condition: service_healthy
      credebl-api-gateway:
        condition: service_healthy
      credebl-user:
        condition: service_started
      credebl-organization:
        condition: service_started

    deploy:
      resources:
        limits:
          memory: 256M

# ---------------------------------------------------------------------------
# Volumes (named credebl_* to avoid conflict with waltid_* volumes)
# ---------------------------------------------------------------------------
volumes:
  credebl_postgres_data:
  credebl_redis_data:
  credebl_nats_data:
  credebl_minio_data:

# No networks section needed: the merged compose project has a single
# default network (waltid_default) declared in the stack compose file.
# Services that omit `networks:` automatically join it.
