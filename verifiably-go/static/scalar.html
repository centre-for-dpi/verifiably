<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Verifiably API Docs</title>
  <style>
    body { margin: 0; }
  </style>
</head>
<body>
  <script
    id="api-reference"
    data-configuration='{
      "spec": {
        "url": "/static/openapi.yaml"
      },
      "theme": "purple",
      "layout": "modern",
      "defaultHttpClient": {
        "targetKey": "shell",
        "clientKey": "curl"
      },
      "authentication": {
        "preferredSecurityScheme": "BearerAuth",
        "http": {
          "bearer": {
            "token": ""
          }
        }
      }
    }'
  ></script>
  <script src="https://cdn.jsdelivr.net/npm/@scalar/api-reference"></script>
</body>
</html>
