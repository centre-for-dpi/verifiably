openapi: 3.0.3
info:
  title: Verifiably API
  version: 1.0.0
  description: |
    REST API for programmatic credential issuance, revocation, and OID4VP
    verification requests. All endpoints require an API key configured via the
    `VERIFIABLY_API_KEYS` environment variable (`name1:key1,name2:key2`).

    Each key is isolated in the issuance log under its own owner scope, so
    credentials issued by key A are never visible to key B.

servers:
  - url: /api/v1
    description: Current instance

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: API key obtained from the operator (VERIFIABLY_API_KEYS).

  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
          example: invalid or missing API key

    StatusListRef:
      type: object
      required: [type, list_id, index]
      properties:
        type:
          type: string
          enum: [bitstring, token]
        list_id:
          type: string
          example: v1
        index:
          type: integer
          example: 42

    IssuedCredential:
      type: object
      required: [id, schema_id, schema_name, issuer_dpg, issued_at, status]
      properties:
        id:
          type: string
          example: vc-1715000000000-a1b2c3
        schema_id:
          type: string
          example: nationalId
        schema_name:
          type: string
          example: National ID
        std:
          type: string
          example: "sd_jwt_vc (IETF)"
        format:
          type: string
          example: dc+sd-jwt
        issuer_dpg:
          type: string
          example: CREDEBL Community Stack
        holder_hint:
          type: string
          example: Jane Doe
        subject_fields:
          type: object
          additionalProperties:
            type: string
        offer_uri:
          type: string
          example: "openid-credential-offer://..."
        issued_at:
          type: string
          format: date-time
        status:
          type: string
          enum: [active, revoked]
        revoked_at:
          type: string
          format: date-time
          nullable: true
        status_list:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/StatusListRef"

    IssueRequest:
      type: object
      required: [schema_id, subject_data]
      properties:
        schema_id:
          type: string
          example: nationalId
        issuer_dpg:
          type: string
          example: CREDEBL Community Stack
        subject_data:
          type: object
          additionalProperties:
            type: string
          example:
            given_name: Jane
            family_name: Doe
            nationalIdentifier: "123456789"

    IssueResult:
      type: object
      required: [credential_id, offer_uri, flow]
      properties:
        credential_id:
          type: string
          example: vc-1715000000000-a1b2c3
        offer_uri:
          type: string
          example: "openid-credential-offer://..."
        pin:
          type: string
          example: "1234"
        flow:
          type: string
          example: pre_auth
        status_list:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/StatusListRef"

    IssueBulkRequest:
      type: object
      required: [schema_id, rows]
      properties:
        schema_id:
          type: string
          example: nationalId
        issuer_dpg:
          type: string
          example: CREDEBL Community Stack
        rows:
          type: array
          minItems: 1
          items:
            type: object
            additionalProperties:
              type: string

    BulkRowResult:
      type: object
      required: [row, status]
      properties:
        row:
          type: integer
          example: 1
        credential_id:
          type: string
          example: vc-1715000000000-a1b2c3
        offer_uri:
          type: string
          example: "openid-credential-offer://..."
        pin:
          type: string
          example: "1234"
        status:
          type: string
          enum: [issued, failed]
        error:
          type: string
          example: "create-offer: upstream 500"

    IssueBulkResult:
      type: object
      required: [accepted, rejected, rows]
      properties:
        accepted:
          type: integer
          example: 2
        rejected:
          type: integer
          example: 0
        rows:
          type: array
          items:
            $ref: "#/components/schemas/BulkRowResult"

    VerifyRequest:
      type: object
      required: [schema_id]
      properties:
        schema_id:
          type: string
          example: nationalId
        verifier_dpg:
          type: string
          example: CREDEBL Community Stack
        fields:
          type: array
          items:
            type: string
          example: [given_name, family_name]

    VerifyRequestResult:
      type: object
      required: [request_uri, state]
      properties:
        request_uri:
          type: string
          example: "openid4vp://authorize?..."
        state:
          type: string
          example: 9f2e8b3c-1a4d-4e5f-8c7b-0d1e2f3a4b5c

    VerifyResult:
      type: object
      required: [status, valid, pending]
      properties:
        status:
          type: string
          enum: [pending, verified, failed]
        valid:
          type: boolean
        pending:
          type: boolean
        method:
          type: string
          example: "OID4VP · selective — SD-JWT VC"
        format:
          type: string
          example: "sd_jwt_vc (IETF)"
        issuer:
          type: string
          example: "(verified by CREDEBL)"
        disclosed:
          type: object
          additionalProperties:
            type: string
        checked_at:
          type: string
          format: date-time

security:
  - BearerAuth: []

paths:
  /credentials/issue:
    post:
      operationId: issueCredential
      summary: Issue a single credential
      description: |
        Creates a pre-authorized OID4VCI offer for one holder. Returns the
        `offer_uri` the holder scans with their wallet. For CREDEBL-backed
        deployments the response also contains a `pin` the holder enters
        during the wallet claim flow.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IssueRequest"
      responses:
        "200":
          description: Offer created successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IssueResult"
        "400":
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Invalid or missing API key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Schema not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "502":
          description: Upstream issuer error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /credentials/issue/bulk:
    post:
      operationId: issueCredentialBulk
      summary: Issue credentials in bulk
      description: |
        Issues one pre-authorized OID4VCI offer per row. Rows that fail
        individually are recorded without aborting the batch.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IssueBulkRequest"
      responses:
        "200":
          description: Batch processed. Check rows[*].status for per-row outcome.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IssueBulkResult"
        "400":
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Invalid or missing API key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Schema not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /credentials:
    get:
      operationId: listCredentials
      summary: List issued credentials
      description: Returns all credentials issued under the authenticated API key, newest first.
      parameters:
        - name: q
          in: query
          description: Case-insensitive substring search.
          schema:
            type: string
        - name: state
          in: query
          description: Filter by revocation state.
          schema:
            type: string
            enum: [all, active, revoked]
        - name: std
          in: query
          description: Filter by credential standard.
          schema:
            type: string
        - name: format
          in: query
          description: Filter by wire format.
          schema:
            type: string
      responses:
        "200":
          description: Credential list with summary counts.
          content:
            application/json:
              schema:
                type: object
                required: [total, active, revoked, items]
                properties:
                  total:
                    type: integer
                  active:
                    type: integer
                  revoked:
                    type: integer
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/IssuedCredential"
        "401":
          description: Invalid or missing API key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /credentials/{id}:
    get:
      operationId: getCredential
      summary: Get one issuance record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          example: vc-1715000000000-a1b2c3
      responses:
        "200":
          description: Credential record.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IssuedCredential"
        "401":
          description: Invalid or missing API key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Credential not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /credentials/{id}/revoke:
    post:
      operationId: revokeCredential
      summary: Revoke a credential
      description: |
        Flips the credential's bit in the status list and stamps revoked_at.
        Idempotent — revoking an already-revoked credential returns 200.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Credential is now revoked.
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  status:
                    type: string
                    example: revoked
                  revoked_at:
                    type: string
                    format: date-time
        "401":
          description: Invalid or missing API key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Credential not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Credential has no status list binding.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /credentials/{id}/reinstate:
    post:
      operationId: reinstateCredential
      summary: Reinstate (un-revoke) a credential
      description: Clears the revocation bit and removes revoked_at.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Credential is now active.
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  status:
                    type: string
                    example: active
        "401":
          description: Invalid or missing API key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Credential not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Credential has no status list binding.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /verify/request:
    post:
      operationId: createVerificationRequest
      summary: Create an OID4VP verification request
      description: |
        Creates a presentation request session. Returns the request_uri the
        holder scans and the state token used to poll for the result.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyRequest"
      responses:
        "200":
          description: Verification session created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerifyRequestResult"
        "400":
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Invalid or missing API key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Schema not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "502":
          description: Upstream verifier error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /verify/result/{state}:
    get:
      operationId: getVerificationResult
      summary: Poll for a verification result
      description: |
        Returns "pending" while the holder hasn't responded. Poll once per
        second until status is "verified" or "failed".
      parameters:
        - name: state
          in: path
          required: true
          description: Session ID from POST /verify/request.
          schema:
            type: string
      responses:
        "200":
          description: Current session status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerifyResult"
        "400":
          description: Missing state parameter.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Invalid or missing API key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "502":
          description: Upstream verifier error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
